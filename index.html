/* ---------- Guess: read your friends ---------- */
// A round spans the target's WHOLE ranking — every ranked song appears, paired
// across their list so each call has a clear preference. Capped so it stays playable.
const GUESS_CAP = 50;
function guessablePairs(p){
  const ids = Object.keys(p.ratings).filter(id=> (p.counts[id]||0)>0 && SONG_BY_ID[id]);
  if(ids.length<2) return [];
  const ranked = ids.map(id=>({id,r:p.ratings[id]})).sort((a,b)=> b.r-a.r).map(x=>x.id);
  const n=ranked.length, half=Math.floor(n/2), pairs=[];
  for(let i=0;i<half;i++){ const A=ranked[i], B=ranked[i+half]; if(A===B) continue;
    const higher = p.ratings[A]>=p.ratings[B]?A:B;
    pairs.push(Math.random()<0.5? {a:A,b:B,higher} : {a:B,b:A,higher}); }
  for(let i=pairs.length-1;i>0;i--){ const j=(Math.random()*(i+1))|0; const t=pairs[i]; pairs[i]=pairs[j]; pairs[j]=t; }
  if(pairs.length>GUESS_CAP){ const step=pairs.length/GUESS_CAP, out=[]; for(let i=0;i<GUESS_CAP;i++) out.push(pairs[Math.floor(i*step)]); return out; }
  return pairs;
}
function guessRankedCount(p){ return p? Object.keys(p.ratings).filter(id=>(p.counts[id]||0)>0 && SONG_BY_ID[id]).length : 0; }
function knowsBoard(guesses){   // aggregate "who guessed best" overall
  const agg={}; for(const g of (guesses||[])){ if(!agg[g.guesser_id]) agg[g.guesser_id]={id:g.guesser_id,name:g.guesser_name,correct:0,total:0,rounds:0};
    agg[g.guesser_id].correct+=g.correct; agg[g.guesser_id].total+=g.total; agg[g.guesser_id].rounds++; }
  return Object.values(agg).sort((a,b)=> b.correct-a.correct);
}
function Guess({me,players,supa,guesses,offline,room}){
  const others = Object.values(players).filter(p=> p.id!==me.id && p.n>0);
  const [tid,setTid]=useState(null);
  const target = others.find(o=>o.id===tid)||others[0]||null;
  const [round,setRound]=useState(null);   // {pairs, idx, correct}
  const [reveal,setReveal]=useState(null);  // {pick, ok}
  const [done,setDone]=useState(null);      // {correct,total,target}
  const board=useMemo(()=> knowsBoard(guesses), [guesses]);
  const myReads=useMemo(()=>{ const agg={};   // your accuracy per friend — who you read right
    for(const g of (guesses||[])){ if(g.guesser_id!==me.id) continue;
      if(!agg[g.target_name]) agg[g.target_name]={name:g.target_name,correct:0,total:0};
      agg[g.target_name].correct+=g.correct; agg[g.target_name].total+=g.total; }
    return Object.values(agg).filter(x=>x.total>0).sort((a,b)=> (b.correct/b.total)-(a.correct/a.total) || b.total-a.total);
  },[guesses,me.id]);
  if(offline) return html`<${Empty} title="Guessing is a group game" sub="Connect your group, then test how well you can read your friends' taste." />`;
  if(!others.length) return html`<${Empty} title="No one to read yet" sub="Once a friend has ranked some songs, you can try to guess their taste." />`;
  const start=()=>{ const pairs=guessablePairs(target); if(pairs.length<3){ alert(target.name+' needs to rank more songs first.'); return; }
    setRound({pairs,idx:0,correct:0}); setReveal(null); setDone(null); };
  const estQ=Math.min(GUESS_CAP, Math.floor(guessRankedCount(target)/2));
  const guess=(song)=>{ if(reveal) return; const ok = song===round.pairs[round.idx].higher; setReveal({pick:song, ok});
    if(supa) supa.from('guesses').insert({room, guesser_id:me.id, guesser_name:me.name, target_name:target.name, correct: ok?1:0, total:1}).then(()=>{}); }; // each guess counts — boards fill in live
  const nextG=()=>{ const correct=round.correct+(reveal&&reveal.ok?1:0); const idx=round.idx+1;
    if(idx>=round.pairs.length){ setDone({correct,total:round.pairs.length,target:target.name}); setRound(null); setReveal(null); }
    else { setRound({...round,idx,correct}); setReveal(null); } };
  return html`<div>
    <div class="head"><h2>Read your friends</h2><span class="line"></span></div>
    <div>
      <div class="head" style="margin:6px 2px 10px"><h2 class="sub">Mind-reader leaderboard</h2><span class="line"></span><span class="meta">most right wins</span></div>
      ${board.length>0 ? html`<div class="list">
        ${board.slice(0,8).map((b,i)=> html`<div class="row">
          <div class=${'rk '+(i<3?'top':'')}>${i+1}</div>
          <div class="body"><div class="t">${b.name}${b.id===me.id?' · you':''}</div>
            <div class="s">${b.total} guess${b.total===1?'':'es'} · ${b.total?Math.round(b.correct/b.total*100):0}% right</div></div>
          <div class="sc num">${b.correct}</div>
        </div>`)}
      </div>` : html`<p class="muted" style="padding:14px 2px;font-size:15px">No guesses yet — start a round below and the board fills in with your very first guess.</p>`}
    </div>
    ${myReads.length>0 && html`<div>
      <div class="head" style="margin:24px 2px 10px"><h2 class="sub">Who you read best</h2><span class="line"></span><span class="meta">your accuracy per friend</span></div>
      <div class="list">
        ${myReads.map((x,i)=> html`<div class="row">
          <div class=${'rk '+(i<3?'top':'')}>${i+1}</div>
          <div class="body"><div class="t">${x.name}</div><div class="s">${x.correct} of ${x.total} right</div></div>
          <div class="sc num">${Math.round(x.correct/x.total*100)}%</div>
        </div>`)}
      </div></div>`}
    <div class="head" style="margin:24px 2px 12px"><h2 class="sub">Play a round</h2><span class="line"></span></div>
    <div class="seg">${others.map(o=> html`<button class=${target&&target.id===o.id?'on':''} onClick=${()=>{ setTid(o.id); setRound(null); setDone(null); setReveal(null); }}>${o.name}</button>`)}</div>
    ${round ? html`<${GuessRound} target=${target} round=${round} reveal=${reveal} onGuess=${guess} onNext=${nextG} />`
      : done ? html`<div class="stage">
          <div class="label kicker">Round complete · ${done.target}</div>
          <div class="winner-song">${done.correct} / ${done.total}</div>
          <p class="muted">You read ${done.target}'s taste ${done.correct>done.total*0.6?'really well':done.correct>done.total*0.4?'pretty well':'… could be better'} — ${Math.round(done.correct/done.total*100)}% right.</p>
          <div class="actions-row"><button class="btn" onClick=${start}>Play again</button></div>
        </div>`
      : html`<div class="stage">
          <div class="label kicker">${estQ>0?estQ+' questions · ':''}their whole ranking</div>
          <h2>How well do you know ${target?target.name:'them'}?</h2>
          <p class="muted" style="margin:8px auto 14px;max-width:32ch">Guess which song they rank higher, across their whole list. Finish it all to get your score. Most right tops the leaderboard.</p>
          <button class="btn" onClick=${start}>Read ${target?target.name:'them'} →</button>
        </div>`}
  </div>`;
}
function GuessRound({target,round,reveal,onGuess,onNext}){
  const p=round.pairs[round.idx];
  const Card=(song)=>{ let cls='song'; let tag=null, tcolor='var(--good)';
    if(reveal){ if(song===p.higher){ cls+=' chosen'; tag='✓ '+target.name+"'s higher pick"; }
      else if(song===reveal.pick){ tag='✗ your guess'; tcolor='var(--bad)'; } }
    return html`<button class=${cls} style=${{'--c':colorOf(song)}} onClick=${()=> !reveal && onGuess(song)}>
      <div class="album">${SONG_BY_ID[song].album} · ${SONG_BY_ID[song].year}</div>
      <div class="ttl">${fmtSong(song)}</div>
      ${tag && html`<div class="label" style=${{marginTop:'8px',color:tcolor}}>${tag}</div>`}
    </button>`; };
  return html`<div>
    <div class="progress" style="margin-top:6px"><span class="label">Q ${round.idx+1} / ${round.pairs.length}</span>
      <div class="bar"><i style=${{width:(round.idx/round.pairs.length*100)+'%'}}></i></div><span class="label num">${round.correct} right</span></div>
    <div class="ask" style="margin-top:14px">Which does ${target.name} rank higher?</div>
    <p class="ask-sub">Guess their taste</p>
    <div class="versus">
      ${Card(p.a)}
      <div class="vs-rule"><span class="l"></span><span class="w">versus</span><span class="l"></span></div>
      ${Card(p.b)}
    </div>
    ${reveal && html`<div class="actions-row"><button class="btn" onClick=${onNext}>${round.idx+1>=round.pairs.length?'See your score':'Next →'}</button></div>`}
  </div>`;
}

/* ---------- Duel (live, N players) ---------- */
function Duel({me,supa,online,offline,onVote,onUndo}){
  const [ds,setDs]=useState(null);         // shared duel state, rendered by everyone
  const [present,setPresent]=useState([]); // who's in the duel room
  const [history,setHistory]=useState([]);
  const [savedDuels,setSavedDuels]=useState([]); // parked/paused duels
  const chanRef=useRef(null);
  const hostStateRef=useRef(baseDuel());

  // settled-clash history from the duels table
  useEffect(()=>{ if(offline||!supa) return; let on=true;
    supa.from('duels').select('*').eq('room',me.room).order('created_at',{ascending:false}).limit(40)
      .then(({data})=>{ if(on&&data) setHistory(data); });
    const h=supa.channel('duelhist:'+me.room).on('postgres_changes',{event:'INSERT',schema:'public',table:'duels',filter:'room=eq.'+me.room},
      p=> setHistory(x=>[p.new,...x])).subscribe();
    return ()=>{ on=false; try{ h.unsubscribe(); }catch{} };
  },[supa, me.room, offline]);

  // parked/paused duels you can resume later
  useEffect(()=>{ if(offline||!supa) return; let on=true;
    const load=()=> supa.from('saved_duels').select('*').eq('room',me.room).order('created_at',{ascending:false})
      .then(({data})=>{ if(on&&data) setSavedDuels(data); });
    load();
    const h=supa.channel('savedduels:'+me.room).on('postgres_changes',{event:'*',schema:'public',table:'saved_duels',filter:'room=eq.'+me.room},
      ()=> load()).subscribe();
    return ()=>{ on=false; try{ h.unsubscribe(); }catch{} };
  },[supa, me.room, offline]);

  // host-authoritative state over an ephemeral broadcast channel.
  // The roster ("who's here") is tracked with broadcast heartbeats, because
  // Realtime *presence* isn't reliable on every project — broadcast is.
  useEffect(()=>{ if(offline||!supa) return;
    const chan=supa.channel('duel:'+me.room,{config:{broadcast:{self:true}}});
    chanRef.current=chan;
    const roster=new Map();           // id -> {id,name,color,ts}
    let lastSig='';
    const liveIds=()=>{ const now=Date.now(), ids=[];
      for(const [id,v] of [...roster]){ if(now-v.ts<10000) ids.push(id); else roster.delete(id); }
      return ids.sort(); };
    const refresh=()=>{ const now=Date.now(), arr=[];
      for(const v of roster.values()){ if(now-v.ts<10000) arr.push({id:v.id,name:v.name,color:v.color}); }
      arr.sort((a,b)=> a.id<b.id?-1:1);
      const sig=arr.map(x=>x.id).join(',');
      if(sig!==lastSig){ lastSig=sig; setPresent(arr); } };
    let liveState=null;   // latest shared state — the source of truth for who's host
    const designatedHost=()=>{ const ids=liveIds(); if(!ids.length) return null;
      if(liveState && liveState.phase!=='lobby' && liveState.host) return ids.includes(liveState.host)? liveState.host : ids[0];
      return ids[0]; };
    const send=(payload)=> chan.send({type:'broadcast',event:'duel',payload});

    chan.on('broadcast',{event:'duel'}, ({payload})=>{
      if(payload.t==='ping'){ roster.set(payload.by,{id:payload.by,name:payload.name,color:payload.color,ts:Date.now()}); refresh();
        const hs=hostStateRef.current;
        if(hs && hs.phase!=='lobby' && hs.host===me.id) send({t:'state', state:hs});   // the running host re-syncs newcomers
        return; }
      if(payload.t==='state'){ liveState=payload.state; setDs(payload.state); if(payload.state.host===me.id) hostStateRef.current=payload.state; return; }
      if(payload.t==='action'){
        if(me.id!==designatedHost()) return;           // only the authoritative host reduces
        const hs=hostStateRef.current;
        const base = (hs && hs.phase!=='lobby' && hs.host===me.id) ? hs : ((liveState && liveState.phase!=='lobby') ? liveState : baseDuel());
        const k=payload.action.kind;
        if(base.phase==='lobby' && k!=='start' && k!=='resume') return;  // gameplay needs a running duel; never clobber from an empty state
        const { state, effect }=duelReduce(base, payload.action);
        hostStateRef.current=state; liveState=state; setDs(state); send({t:'state', state});
        if(effect&&effect.type==='record'){
          supa.from('duels').insert({ room:me.room, song_a:effect.row.song_a, song_b:effect.row.song_b,
            winner:effect.row.winner, winner_lyric:effect.row.winner_lyric,
            player_a:effect.row.player_a, player_b:effect.row.player_b,
            mode:effect.row.mode, rounds:effect.row.rounds }).then(()=>{});
        }
        if(effect&&effect.type==='saveDuel'){
          const snap=effect.snapshot;
          supa.from('saved_duels').insert({ room:me.room,
            label: (snap.players||[]).map(id=> snap.names[id]||'?').join(' · ')+(snap.scope&&snap.scope!=='all'?' · '+groupName(snap.scope):''),
            state: snap }).then(()=>{});
        }
      }
    });
    let hb=null;
    const beat=()=>{ roster.set(me.id,{id:me.id,name:me.name,color:me.color,ts:Date.now()}); refresh();
      send({t:'ping', by:me.id, name:me.name, color:me.color}); };
    chan.subscribe(st=>{ if(st==='SUBSCRIBED'){ beat(); hb=setInterval(beat,3000); } });
    const pr=setInterval(refresh,3000);
    return ()=>{ if(hb) clearInterval(hb); clearInterval(pr); try{ chan.unsubscribe(); }catch{} chanRef.current=null; };
  },[supa, me.id, me.room, me.name, me.color, offline]);

  const dispatch=useCallback((action)=>{ const ch=chanRef.current; if(!ch) return;
    ch.send({type:'broadcast',event:'duel',payload:{t:'action', action:{...action, by:me.id, name:me.name, color:me.color}}}); },[me]);

  if(offline) return html`<${Empty} title="Duel is a live mode" sub="Connect your group (menu) and open this on each player's device to settle clashes in real time — with lyrics." />`;

  const ps=present;
  const provisionalHost=ps[0]?ps[0].id:null;
  const started=ds && ds.phase!=='lobby';
  const amHost=started ? (me.id===ds.host) : (me.id===provisionalHost);
  const startDuel=(scope)=>{ if(ps.length<2) return; const seed=Math.floor(Math.random()*2e9)+1;
    dispatch({kind:'start', host:me.id, players:ps.map(p=>p.id),
      names:Object.fromEntries(ps.map(p=>[p.id,p.name])), colors:Object.fromEntries(ps.map(p=>[p.id,p.color])), seed, scope:scope||'all'}); };
  const stopDuel=(save)=> dispatch({kind: save?'save':'abort'});
  const resumeDuel=(row)=>{ dispatch({kind:'resume', state:row.state, host:me.id});
    if(supa) supa.from('saved_duels').delete().eq('id',row.id).then(()=>{}); };
  const deleteSaved=(row)=>{ if(supa) supa.from('saved_duels').delete().eq('id',row.id).then(()=>{}); };
  const joinDuel=()=> dispatch({kind:'join'});

  return html`<${DuelView} me=${me} ds=${ds} present=${ps} amHost=${amHost} started=${started}
    dispatch=${dispatch} startDuel=${startDuel} history=${history} joinDuel=${joinDuel} onVote=${onVote} onUndo=${onUndo}
    savedDuels=${savedDuels} stopDuel=${stopDuel} resumeDuel=${resumeDuel} deleteSaved=${deleteSaved} />`;
}

function DuelView({me,ds,present,amHost,started,dispatch,startDuel,history,joinDuel,onVote,onUndo,savedDuels,stopDuel,resumeDuel,deleteSaved}){
  const [scope,setScope]=useState('all');
  const [stopSheet,setStopSheet]=useState(false);
  const saved = savedDuels||[];
  const savedPanel = saved.length>0 ? html`<div>
    <div class="head" style="margin:26px 2px 12px"><h2 class="sub">Paused duels</h2><span class="line"></span><span class="meta">${saved.length}</span></div>
    ${saved.map(row=> html`<div class="clash" style="display:flex;align-items:center;gap:10px;padding:13px 14px">

        <div class="duel-people">
          ${present.length===0 ? html`<span class="wait">Opening the room…</span>` :
            present.map(p=> html`<div class="person"><div class="ava lit" style=${{background:p.color,marginLeft:0}}>${initials(p.name)}</div><span>${p.name}${p.id===me.id?' (you)':''}</span></div>`)}
        </div>
        ${present.length>=2 && html`<div style="display:flex;justify-content:center;margin:4px 0 16px">
          <select class="scope-sel" value=${scope} onChange=${e=>setScope(e.target.value)}>
            <option value="all">Whole catalog</option>
            ${ALBUM_GROUPS.map(g=> html`<option value=${g.key}>Mini round · ${g.name}</option>`)}
          </select></div>`}
        ${present.length<2 ? html`<div class="wait">Waiting for another player to open Duel…</div>`
          : html`<button class="btn" onClick=${()=>startDuel(scope)}>Begin · ${present.length} players</button>`}
      </div>
      ${savedPanel}
      ${history.length>0 && html`<${DuelHistory} history=${history} />`}`;
  }
  if(ds.phase==='done'){
    return html`
      <div class="head"><h2>Duel results</h2><span class="line"></span></div>
      <div class="stage">
        <div class="label kicker">Duel complete</div>
        <h2>${ds.settled} clash${ds.settled===1?'':'es'} settled</h2>
        ${ds.settled>0
          ? html`<p class="muted" style="margin-top:6px">Every clash you resolved is below — winning song and lyric.</p>`
          : html`<p class="muted" style="margin-top:6px">No clashes this round — you were all in sync!</p>`}
        <div class="actions-row">
          ${present.length>=2 ? html`<button class="btn" onClick=${()=>startDuel(scope)}>Start a new duel</button>` : ''}
          <button class="btn outline" onClick=${()=>dispatch({kind:'abort'})}>← Back to lobby</button>
        </div>
      </div>
      ${history.length>0 && html`<${DuelHistory} history=${history} />`}`;
  }
  if(!ds.players.includes(me.id)){
    return html`
      <div class="head"><h2>Live Duel</h2><span class="line"></span></div>
      <div class="stage"><div class="label kicker">A duel is underway</div>
        <h2>${ds.players.length} ${ds.players.length===1?'player is':'players are'} dueling</h2>
        <p class="muted" style="margin:8px auto 16px;max-width:32ch">Hop in now — you'll start from the top, and clashes with the others queue up as you catch up.</p>
        <button class="btn" onClick=${joinDuel}>Join the duel →</button></div>
      ${history.length>0 && html`<${DuelHistory} history=${history} />`}`;
  }
  const myBoutId=ds.busy[me.id];
  const d=myBoutId?ds.duels[myBoutId]:null;
  const activeBouts=Object.values(ds.duels).filter(b=>b.phase!=='resolved').length;
  return html`
    <div class="head"><h2>Live Duel</h2><span class="line"></span><span class="meta">${ds.players.length}p · ${ds.settled} settled</span>
      <button class="btn outline sm" onClick=${()=>setStopSheet(true)}>Pause</button></div>
    ${d ? html`<${DuelBout} me=${me} ds=${ds} d=${d} dispatch=${dispatch} />`
        : html`<${DuelChoosing} me=${me} ds=${ds} dispatch=${dispatch} activeBouts=${activeBouts} onVote=${onVote} onUndo=${onUndo} />`}
    ${history.length>0 && html`<${DuelHistory} history=${history} />`}
    ${stopSheet && html`<div class="sheet-bg" onClick=${()=>setStopSheet(false)}><div class="sheet" onClick=${e=>e.stopPropagation()}>
      <div class="label">Stop this duel</div>
      <h2 style="font-size:23px;margin:6px 0 4px">What next?</h2>
      <p class="muted" style="font-size:14px;margin:0 0 16px">This ends the duel for everyone. Settled clashes are always kept.</p>
      <button class="btn" style="width:100%;margin-bottom:10px" onClick=${()=>{ dispatch({kind:'end'}); setStopSheet(false); }}>Finish & see results</button>
      <button class="btn outline" style="width:100%;margin-bottom:10px" onClick=${()=>{ stopDuel(true); setStopSheet(false); }}>Save — resume later</button>
      <button class="btn outline" style="width:100%;margin-bottom:10px" onClick=${()=>{ if(confirm('Delete this duel? It cannot be resumed (settled clashes are kept).')){ stopDuel(false); setStopSheet(false); } }}>Delete duel</button>
      <button class="btn outline" style="width:100%" onClick=${()=>setStopSheet(false)}>Keep playing</button>
    </div></div>`}`;
}

function DuelChoosing({me,ds,dispatch,activeBouts,onVote,onUndo}){
  const idx=ds.cursor[me.id]||0;
  const pair=ds.seq[idx];
  const [sent,setSent]=useState(null);
  const shownAt=useRef(Date.now()); const lastVote=useRef(null);
  useEffect(()=>{ setSent(null); shownAt.current=Date.now(); },[idx]);
  if(!pair) return html`<div class="stage"><div class="wait">Loading the next matchup…</div></div>`;
  const poolN=scopedPool(ds.scope).length;
  const seen=new Set(); for(let i=0;i<idx;i++){ const p=ds.seq[i]; if(p){ seen.add(p[0]); seen.add(p[1]); } }
  const pct=poolN? Math.min(100, Math.round(seen.size/poolN*100)) : 0;
  const pick=async(song)=>{ if(sent!=null) return; setSent(song);
    const loser = pair[0]===song? pair[1] : pair[0];
    const id = onVote ? await onVote(song, loser, Math.min(Date.now()-shownAt.current,600000)) : null; // duel picks count toward your ranking + analytics
    lastVote.current=id; dispatch({kind:'pick',matchup:idx,song}); };
  const goBack=()=>{ dispatch({kind:'unpick'}); const id=lastVote.current; lastVote.current=null; if(id&&onUndo) onUndo(id); };
  const pending=ds.queue.filter(c=> c.players.includes(me.id)).map(c=> ds.names[c.players.find(p=>p!==me.id)]);
  const Card=(song)=> html`<button class=${'song '+(sent===song?'chosen':'')} style=${{'--c':colorOf(song)}} onClick=${()=>pick(song)}>
    <div class="album">${SONG_BY_ID[song].album} · ${SONG_BY_ID[song].year}</div>
    <div class="ttl">${fmtSong(song)}</div></button>`;
  return html`<div>
    <div class="progress" style="margin-top:6px">
      <span class="label">${pct}% explored</span>
      <div class="bar"><i style=${{width:pct+'%'}}></i></div>
      <span class="label num">${seen.size} / ${poolN}</span>
    </div>
    <div class="ask" style="margin-top:14px">Which is better?</div>
    <p class="ask-sub">Matchup ${idx+1}${ds.scope&&ds.scope!=='all'?' · '+groupName(ds.scope):''} · go at your own pace</p>
    <div class="versus">
      ${Card(pair[0])}
      <div class="vs-rule"><span class="l"></span><span class="w">versus</span><span class="l"></span></div>
      ${Card(pair[1])}
    </div>
    <div class="actions-row" style="margin-top:8px">
      ${idx>0 && sent==null ? html`<button class="btn outline sm" onClick=${goBack}>↶ Go back</button>` : ''}
    </div>
    ${sent!=null && html`<p class="wait" style="text-align:center">Saved — next matchup loading…</p>`}
    ${pending.length>0 && html`<p class="wait" style="text-align:center;color:var(--accent)">A clash with ${pending.join(', ')} is waiting — they're mid-duel. Keep choosing.</p>`}
    ${activeBouts>0 && html`<p class="wait" style="text-align:center">${activeBouts} duel${activeBouts===1?'':'s'} happening now</p>`}
  </div>`;
}

function DuelBout({me,ds,d,dispatch}){
  const partnerId=d.players.find(p=>p!==me.id);
  const partner=ds.names[partnerId]||'your rival';
  const phase=d.phase;
  return html`<div>
    ${phase==='conflict' && html`<div class="stage">
      <div class="label kicker">A clash with ${partner}</div>
      <h2>You disagree</h2>
      <div style="display:flex;gap:16px;margin:18px 0;text-align:left">
        <div style="flex:1"><div class="nm label" style=${{color:me.color}}>You chose</div><div class="pk" style="font-size:20px">${fmtSong(d.champions[me.id])}</div></div>
        <div style="flex:1;text-align:right"><div class="nm label">${partner} chose</div><div class="pk" style="font-size:20px">${fmtSong(d.champions[partnerId])}</div></div>
      </div>
      <p class="muted" style="margin-bottom:16px">Settle it with the best lyric from each song — or, if you're together, decide out loud.</p>
      <div class="actions-row">
        <button class="btn" onClick=${()=>dispatch({kind:'mode',mode:'lyric'})}>Lyric battle</button>
        <button class="btn outline" onClick=${()=>dispatch({kind:'mode',mode:'together'})}>We're together</button>
      </div>
    </div>`}

    ${phase==='together' && html`<div class="stage">
      <div class="label kicker">Decide together${d.tmiss?' · try again':''}</div>
      <h2>Which song wins?</h2>
      <p class="muted" style="margin:6px auto 16px;max-width:32ch">Talk it out with ${partner}, then both tap the same song.</p>
      ${d.tmiss>0 && html`<p class="wait" style="color:var(--bad)">You tapped different songs — agree and tap again.</p>`}
      <div style="display:flex;flex-direction:column;gap:12px">
        ${[d.pair[0],d.pair[1]].map(song=> html`<button class="song" style=${{'--c':colorOf(song)}} onClick=${()=>dispatch({kind:'togetherpick',song})}>
          <div class="album">${SONG_BY_ID[song].album} · ${SONG_BY_ID[song].year}</div><div class="ttl">${fmtSong(song)}</div></button>`)}
      </div>
      ${d.tpicks[me.id] && html`<div class="wait">You tapped ${fmtSong(d.tpicks[me.id])} — waiting for ${partner}…</div>`}
    </div>`}

    ${phase==='lyric' && html`<${LyricInput} d=${d} me=${me} partner=${partner} dispatch=${dispatch} />`}
    ${phase==='lyricvote' && html`<${LyricVote} d=${d} me=${me} partner=${partner} partnerId=${partnerId} dispatch=${dispatch} />`}

    ${phase==='resolved' && html`<div class="stage">
      <div class="label kicker">${d.mode==='draw'?'Called a draw': d.mode==='together'?'Settled in person':'The winning lyric'}</div>
      ${d.winner ? html`<div class="winner-song">${fmtSong(d.winner)}</div>` : html`<h2>A draw</h2>`}
      ${d.winLyric ? html`<div class="quote">“${d.winLyric}”</div>` : ''}
      <p class="muted">vs ${partner} · ${d.mode==='lyric'? ('settled in '+d.round+' round'+(d.round===1?'':'s')) : d.mode==='together'? 'decided together' : 'no winner'}</p>
      <div class="actions-row"><button class="btn" onClick=${()=>dispatch({kind:'continue'})}>${d.continued[me.id]?'Waiting for '+partner+'…':'Continue ranking'}</button></div>
    </div>`}

    ${(phase==='lyric'||phase==='lyricvote') && d.round>=4 && html`<div class="actions-row" style="margin-top:14px"><button class="btn outline sm" onClick=${()=>dispatch({kind:'draw'})}>Can't agree — call it a draw</button></div>`}
  </div>`;
}

// Fetches the song's lyrics at runtime (lrclib.net) so players can tap a line
// instead of typing. Lyrics are never bundled in the app — only fetched live.
function LyricInput({d,me,partner,dispatch}){
  const mine=d.champions[me.id]; const title=fmtSong(mine);
  const submitted=d.lyrics[me.id]!=null;
  const [lines,setLines]=useState(null);   // null = loading, [] = none found, [..] = lines
  const [sel,setSel]=useState([]);         // up to 3 chosen lines, in tap order
  const [text,setText]=useState('');
  const [typing,setTyping]=useState(false);
  useEffect(()=>{ let on=true; const ctrl=new AbortController(); const to=setTimeout(()=>ctrl.abort(),9000);
    fetch('https://lrclib.net/api/search?artist_name=Taylor+Swift&track_name='+encodeURIComponent(title),{signal:ctrl.signal})
      .then(r=>r.json()).then(arr=>{ if(!on) return;
        const hit=(arr||[]).find(x=> x.plainLyrics && x.plainLyrics.length>20);
        if(!hit){ setLines([]); return; }
        const seen=new Set(), ls=[];
        for(const raw of hit.plainLyrics.split('\n')){ const l=raw.trim();
          if(!l || /^\[.*\]$/.test(l) || seen.has(l)) continue; seen.add(l); ls.push(l); if(ls.length>=80) break; }
        setLines(ls);
      }).catch(()=>{ if(on) setLines([]); }).finally(()=>clearTimeout(to));
    return ()=>{ on=false; ctrl.abort(); clearTimeout(to); };
  },[title]);
  const MAX=3;
  const toggle=(l)=> setSel(cur=> cur.includes(l) ? cur.filter(x=>x!==l) : (cur.length>=MAX ? cur : [...cur,l]));
  const submitSel=()=>{ if(sel.length) dispatch({kind:'lyric',text:sel.join('\n')}); };
  const submitText=()=>{ const v=(text||'').trim(); if(v) dispatch({kind:'lyric',text:v}); };

  if(submitted) return html`<div class="stage" style="text-align:left">
    <div style="text-align:center"><div class="label kicker">Make your case${d.round>1?' · round '+d.round:''}</div></div>
    <div class="lyric-card" style="margin-top:12px"><div class="for label">Your pick · ${title}</div><div class="ly">“${d.lyrics[me.id]}”</div></div>
    <div class="wait" style="text-align:center">Waiting for ${partner}…</div></div>`;

  return html`<div class="stage" style="text-align:left">
    <div style="text-align:center"><div class="label kicker">Make your case${d.round>1?' · round '+d.round:''}</div>
      <h2 style="text-align:center">Pick up to 3 lines</h2>
      <p class="muted" style="text-align:center;margin:6px 0 14px">Defending <b>${title}</b> vs ${partner}</p></div>
    ${lines===null && html`<div class="wait" style="text-align:center">Finding the lyrics…</div>`}
    ${lines && lines.length>0 && !typing && html`<div>
      <div class="lyric-list">
        ${lines.map(l=> html`<button class=${'lyric-line'+(sel.includes(l)?' sel':'')} onClick=${()=>toggle(l)}>
          ${sel.includes(l)?html`<span class="pick-n">${sel.indexOf(l)+1}</span>`:''}${l}</button>`)}
      </div>
      <div class="actions-row" style="margin-top:14px">
        <button class="btn" disabled=${!sel.length} onClick=${submitSel}>Lock in ${sel.length||''} line${sel.length===1?'':'s'}</button>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:10px">
        <span class="label" style="opacity:.7">lyrics via lrclib.net · pick up to 3</span>
        <button class="btn outline sm" onClick=${()=>setTyping(true)}>Type instead</button>
      </div>
    </div>`}
    ${(typing || (lines && lines.length===0)) && html`<div>
      ${lines && lines.length===0 && html`<p class="muted" style="text-align:center;margin:4px 0 12px">Couldn't fetch this one — type your favorite line(s).</p>`}
      <textarea placeholder=${'A line or two from "'+title+'"…'} value=${text} onInput=${e=>setText(e.target.value)} maxLength=${300}></textarea>
      <div class="actions-row"><button class="btn" disabled=${!text.trim()} onClick=${submitText}>Submit</button></div>
      ${lines && lines.length>0 && html`<div style="text-align:center;margin-top:8px"><button class="btn outline sm" onClick=${()=>setTyping(false)}>Back to lyrics</button></div>`}
    </div>`}
  </div>`;
}
function LyricVote({d,me,partner,partnerId,dispatch}){
  const myChamp=d.champions[me.id], theirChamp=d.champions[partnerId];
  const voted=d.lyricVotes[me.id]!=null;
  const Card=(song, who)=> html`<button class=${'lyric-card '+(d.lyricVotes[me.id]===song?'sel':'')} style="margin-bottom:12px"
      onClick=${()=> !voted && dispatch({kind:'lyricvote',song})}>
    <div class="for label">For ${fmtSong(song)}</div>
    <div class="ly">“${d.lyrics[who]}”</div>
  </button>`;
  return html`<div class="stage" style="text-align:left">
    <div style="text-align:center"><div class="label kicker">Vote the better lyric${d.round>1?' · round '+d.round:''}</div>
      <h2 style="text-align:center">Whose line wins?</h2>
      <p class="muted" style="text-align:center;margin:6px 0 16px">You and ${partner} must pick the same one</p></div>
    ${Card(myChamp, me.id)}
    ${Card(theirChamp, partnerId)}
    ${voted ? html`<div class="wait" style="text-align:center">You voted — waiting for ${partner}…</div>`
      : html`<div class="wait" style="text-align:center">Tap the better lyric</div>`}
  </div>`;
}

/* ---------- Join ---------- */
function dedupeProfiles(rows){ const m={}; for(const r of (rows||[])){ if(!r.player_id||m[r.player_id]) continue;
  m[r.player_id]={id:r.player_id, name:r.player_name, color:r.player_color||COLORS[0]}; } return Object.values(m); }
function Join({offline,onJoin}){
  const prev=LS.get('ss_me',null);
  const [room,setRoom]=useState(prev?.room||'besties');
  const [profiles,setProfiles]=useState(null);   // existing profiles in this room (null=loading)
  const [mode,setMode]=useState('pick');          // 'pick' | 'new'
  const [name,setName]=useState(prev?.name||''); const [color,setColor]=useState(prev?.color||COLORS[0]);
  useEffect(()=>{ let on=true; setProfiles(null); const r=slug(room)||'besties';
    const t=setTimeout(()=>{
      if(offline){ if(on) setProfiles(dedupeProfiles(LS.get('ss_votes_'+r,[]))); return; }
      const c=cfg(); if(!c.ready){ if(on) setProfiles([]); return; }
      createClient(c.url,c.key).from('votes').select('player_id,player_name,player_color').eq('room',r)
        .then(({data})=>{ if(on) setProfiles(dedupeProfiles(data||[])); });
    },350);
    return ()=>{ on=false; clearTimeout(t); };
  },[room,offline]);
  const r=slug(room)||'besties';
  const pick=(p)=> onJoin({ id:p.id, name:p.name, room:r, color:p.color });
  const createNew=()=>{ const nm=name.trim(); if(!nm){ alert('What should we call you?'); return; }
    const id=r+'~'+(slug(nm)||'player');
    if((profiles||[]).some(p=>p.id===id)){ if(confirm('A profile named "'+nm+'" already exists here — use it (keep its progress)?')) onJoin({id,name:nm,room:r,color:(profiles.find(p=>p.id===id)||{}).color||color}); return; }
    onJoin({ id, name:nm, room:r, color }); };
  return html`<div class="center"><div class="card pad" style="max-width:440px">
    <div class="label">${offline?'Solo mode':'Take your seat'}</div>
    <h1 style="font-size:30px;margin:6px 0 14px">Join the Index</h1>
    <label class="fld label">Room — everyone types the same word</label>
    <input placeholder="besties" value=${room} onInput=${e=>{ setRoom(e.target.value); setMode('pick'); }} maxLength=${24} />
    ${mode==='pick' ? html`<div>
      <label class="fld label">Who are you?</label>
      ${profiles===null ? html`<p class="muted" style="font-size:14px;padding:8px 2px">Looking up profiles in “${r}”…</p>`
        : profiles.length ? html`<div class="list" style="border-top:1px solid var(--line)">
            ${profiles.map(p=> html`<button class="row" style="width:100%;text-align:left;background:none;border:none;border-bottom:1px solid var(--line);cursor:pointer;padding:11px 4px" onClick=${()=>pick(p)}>
              <div class="ava" style=${{background:p.color,marginLeft:0,width:'30px',height:'30px',fontSize:'12px'}}>${initials(p.name)}</div>
              <div class="body"><div class="t">${p.name}</div></div>
              <div class="sc" style="color:var(--accent)">resume →</div>
            </button>`)}
          </div>`
        : html`<p class="muted" style="font-size:14px;padding:8px 2px">No profiles here yet — be the first.</p>`}
      <button class="btn outline" style="width:100%;margin-top:14px" onClick=${()=>setMode('new')}>+ New player</button>
      <p class="muted" style="font-size:12.5px;margin:14px 0 0;line-height:1.45">Tap your existing profile to keep your ranking. Only make a new one if you haven't played in this room before.</p>
    </div>` : html`<div>
      <label class="fld label">Your name</label>
      <input placeholder="e.g. Kaitlyn" value=${name} onInput=${e=>setName(e.target.value)} maxLength=${24} />
      <label class="fld label">Your color</label>
      <div class="swatches">${COLORS.map(c=> html`<button class=${'sw '+(color===c?'sel':'')} style=${{background:c}} onClick=${()=>setColor(c)} aria-label="color"></button>`)}</div>
      <div style="display:flex;gap:10px;margin-top:18px">
        <button class="btn" style="flex:1" onClick=${createNew}>Create & enter</button>
        ${(profiles&&profiles.length)?html`<button class="btn outline" onClick=${()=>setMode('pick')}>Back</button>`:''}
      </div>
    </div>`}
  </div></div>`;
}

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <div class="label">Delete profiles</div><button class="btn outline sm" onClick=${()=>setView('main')}>Back</button></div>
      ${!unlocked ? html`<div>
        <p class="muted" style="font-size:14px;margin:0 0 12px">Enter the admin password to remove profiles.</p>
        <input type="password" placeholder="Admin password" value=${pw} onInput=${e=>setPw(e.target.value)} />
        <button class="btn" style="width:100%;margin-top:12px" onClick=${()=>{ if(pw===ADMIN_PASSWORD){ setUnlocked(true); setPw(''); } else alert('Wrong password.'); }}>Unlock</button>
      </div>` : html`<div>
        <p class="muted" style="font-size:13px;margin:0 0 8px">Tap delete to permanently remove a profile and all of its data.</p>
        <div class="list" style="border-top:1px solid var(--line);max-height:46vh;overflow-y:auto">
          ${profiles.length ? profiles.map(p=> html`<div class="row">
            <div class="ava" style=${{background:p.color,marginLeft:0,width:'28px',height:'28px',fontSize:'11px'}}>${initials(p.name)}</div>
            <div class="body"><div class="t">${p.name}${p.id===me.id?' · you':''}</div><div class="s">${p.n} battle${p.n===1?'':'s'}</div></div>
            <button class="btn outline sm" disabled=${busy===p.id} onClick=${()=>removeProfile(p)}>${busy===p.id?'…':'Delete'}</button>
          </div>`) : html`<div class="muted" style="padding:10px 2px">No profiles found.</div>`}
        </div>
      </div>`}
    </div></div>`;
  }
  return html`<div class="sheet-bg" onClick=${onClose}><div class="sheet" onClick=${e=>e.stopPropagation()}>
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <div class="ava" style=${{background:me.color,marginLeft:0,width:'38px',height:'38px',fontSize:'13px'}}>${initials(me.name)}</div>
      <div><div style="font-size:20px">${me.name}</div><div class="label">room ${me.room}${offline?' · solo':''}</div></div>
    </div>
    ${!offline && html`<div class="notice" style="margin-bottom:14px;font-size:13px">Your ranking and duel history save automatically to <b>${me.name}</b> in <b>${me.room}</b>. Rejoin with the same name + room on any device to pick up where you left off.</div>`}
    <button class="btn outline" style="width:100%;margin-bottom:10px" onClick=${onHow}>How it works</button>
    <button class="btn outline" style="width:100%;margin-bottom:10px" onClick=${onSwitch}>Switch / change profile</button>
    <button class="btn outline" style="width:100%;margin-bottom:10px" onClick=${onReset}>Reset my battles</button>
    ${!offline && html`<button class="btn outline" style="width:100%;margin-bottom:10px" onClick=${()=>setView('manage')}>Delete profiles…</button>`}
    <button class="btn" style="width:100%" onClick=${onClose}>Close</button>
    <p class="label" style="text-align:center;margin:16px 0 0">${TOTAL} songs · Elo-ranked · ${BUILD}</p>
  </div></div>`;
}

render(html`<${App} />`, document.getElementById('app'));
</script>
</body>
</html>
