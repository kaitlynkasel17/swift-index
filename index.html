<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>The Swift Index — rank every Taylor Swift song</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f4efe6; --panel:#efe8da; --paper:#faf6ee; --paper2:#f6f1e7;
    --ink:#1b1813; --ink2:#4a4339; --muted:#8a8073; --faint:#b6ab98;
    --line:#ddd2bf; --line2:#cabda6;
    --accent:#7a5c34; --accent2:#9a7b4f; --gold:#9c7c45;
    --good:#4f6f4a; --bad:#9a4a3f;
    --serif:'EB Garamond', Georgia, 'Times New Roman', serif;
    --sans:system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--bg); color:var(--ink); min-height:100dvh;
    font-family:var(--serif); font-size:18px; line-height:1.5;
    -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  }
  h1,h2,h3{font-family:var(--serif); font-weight:500; letter-spacing:.2px; margin:0}
  ::selection{background:rgba(122,92,52,.18)}
  button{font-family:inherit; cursor:pointer; color:inherit}
  .wrap{max-width:680px; margin:0 auto; padding:0 22px 140px}
  .center{min-height:100dvh; display:flex; align-items:center; justify-content:center; padding:26px}

  /* typographic helpers */
  .label{font-family:var(--sans); font-size:10.5px; font-weight:600; letter-spacing:.13em; text-transform:uppercase; color:var(--muted)}
  .muted{color:var(--muted)}
  .ink2{color:var(--ink2)}
  .serif-it{font-style:italic}
  .num{font-variant-numeric:tabular-nums lining-nums; letter-spacing:.01em}
  .rule{height:1px; background:var(--line); border:none; margin:0}
  .hairline{border:1px solid var(--line)}

  /* header */
  header.top{position:sticky; top:0; z-index:30; background:rgba(244,239,230,.86); backdrop-filter:blur(10px); border-bottom:1px solid var(--line)}
  .top .row{max-width:680px; margin:0 auto; padding:13px 22px; display:flex; align-items:center; gap:12px}
  .wordmark{font-family:var(--serif); font-size:20px; letter-spacing:.3px; line-height:1; display:flex; align-items:baseline; gap:9px}
  .wordmark .n{font-style:italic; color:var(--accent)}
  .roomtag{font-family:var(--sans); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted); border:1px solid var(--line); border-radius:2px; padding:3px 7px}
  .grow{flex:1}
  .presence{display:flex; align-items:center}
  .ava{width:25px; height:25px; border-radius:50%; display:grid; place-items:center; font-family:var(--sans);
    font-size:10px; font-weight:700; color:#faf6ee; border:1.5px solid var(--bg); margin-left:-7px}
  .ava.lit{box-shadow:0 0 0 1.5px var(--good)}
  .icon-btn{background:none; border:1px solid var(--line); width:32px; height:32px; border-radius:3px; font-family:var(--serif); font-size:18px; line-height:1; color:var(--ink2)}
  .icon-btn:hover{border-color:var(--accent); color:var(--accent)}

  /* bottom nav — two rows: sub-tabs (top) + group tabs (bottom) */
  nav.tabs{position:fixed; bottom:0; left:0; right:0; z-index:30; background:rgba(244,239,230,.96); backdrop-filter:blur(10px); border-top:1px solid var(--line); display:flex; flex-direction:column}
  nav.tabs .subrow{max-width:680px; width:100%; margin:0 auto; display:flex; padding:0 8px}
  nav.tabs .grouprow{max-width:680px; width:100%; margin:0 auto; display:flex; border-top:1px solid var(--line); padding:0 8px calc(2px + env(safe-area-inset-bottom))}
  .tab{flex:1; background:none; border:none; padding:9px 1px 8px; position:relative; font-family:var(--sans);
    font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted); font-weight:600; white-space:nowrap}
  .tab .ind{position:absolute; top:-1px; left:50%; transform:translateX(-50%); width:0; height:2px; background:var(--accent); transition:width .18s ease}
  .tab.active{color:var(--ink)}
  .tab.active .ind{width:26px}
  .tab .dot{position:absolute; top:7px; right:50%; margin-right:-15px; width:5px; height:5px; border-radius:50%; background:var(--accent)}
  .gtab{flex:1; background:none; border:none; padding:10px 4px; font-family:var(--sans); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); font-weight:700}
  .gtab.on{color:var(--ink)}

  /* generic */
  .card{background:var(--paper); border:1px solid var(--line); border-radius:3px}
  .pad{padding:20px}
  .btn{font-family:var(--sans); font-size:13px; letter-spacing:.08em; text-transform:uppercase; font-weight:600;
    background:var(--ink); color:var(--bg); border:1px solid var(--ink); padding:13px 20px; border-radius:3px; transition:.15s}
  .btn:hover{background:var(--accent); border-color:var(--accent)}
  .btn.outline{background:none; color:var(--ink); border:1px solid var(--line)}
  .btn.outline:hover{background:none; border-color:var(--accent); color:var(--accent)}
  .btn:disabled{opacity:.4; cursor:default}
  .btn.sm{padding:9px 14px; font-size:11px}
  input,textarea,select{width:100%; font-family:var(--serif); font-size:17px; background:var(--paper); border:1px solid var(--line);
    color:var(--ink); padding:12px 14px; border-radius:3px; outline:none}
  input:focus,textarea:focus{border-color:var(--accent)}
  textarea{resize:vertical; min-height:74px; line-height:1.5}
  label.fld{display:block; margin:18px 0 7px}
  .swatches{display:flex; gap:10px; flex-wrap:wrap; margin-top:8px}
  .sw{width:30px; height:30px; border-radius:50%; border:1px solid var(--line); position:relative}
  .sw.sel:after{content:''; position:absolute; inset:-4px; border:1px solid var(--ink); border-radius:50%}
  .scope-sel{width:auto; display:inline-block; font-family:var(--sans); font-size:12px; letter-spacing:.06em; text-transform:uppercase;
    color:var(--ink2); background:var(--paper); border:1px solid var(--line); border-radius:999px; padding:7px 16px; cursor:pointer}
  .scope-sel:focus{border-color:var(--accent)}
  /* stat cards */
  .stat-grid{display:grid; grid-template-columns:1fr 1fr; gap:10px; margin:6px 0}
  .stat{border:1px solid var(--line); border-radius:3px; padding:14px 15px; background:var(--paper)}
  .stat .k{font-family:var(--sans); font-size:10px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted)}
  .stat .v{font-size:26px; line-height:1.1; margin-top:5px; font-variant-numeric:tabular-nums}
  .stat .sub2{font-size:13px; color:var(--muted); margin-top:3px; font-style:italic}
  .stat.wide{grid-column:1 / -1}
  .bars .barrow{display:flex; align-items:center; gap:10px; padding:8px 2px; border-bottom:1px solid var(--line)}
  .bars .barrow:last-child{border-bottom:none}
  .bars .bl{width:118px; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .bars .bt{flex:1; height:8px; background:var(--paper2); border:1px solid var(--line); border-radius:999px; overflow:hidden}
  .bars .bt > i{display:block; height:100%; background:var(--accent)}
  .bars .bv{width:52px; text-align:right; font-variant-numeric:tabular-nums; font-size:13px; color:var(--ink2)}
  /* pyramid */
  .pyramid{display:flex; flex-direction:column; align-items:center; gap:5px; margin:12px 0 12px; padding:14px 10px 18px;
    width:min(95vw, 1180px); position:relative; left:50%; transform:translateX(-50%);   /* break out of the narrow column & center on the page */
    background:radial-gradient(130% 70% at 50% -8%, rgba(122,92,52,.09), transparent 66%); border-radius:16px}
  .pyr-row{display:flex; gap:5px; justify-content:center; width:100%}
  .pyr-cell{flex:1 1 0; min-width:0; max-width:148px; min-height:54px; border:none; border-radius:7px; cursor:pointer;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2px; padding:5px 3px; position:relative; overflow:hidden;
    color:#fff; font-family:var(--sans); -webkit-user-select:none; user-select:none;
    box-shadow:0 2px 4px rgba(52,38,22,.16), inset 0 0 0 1px rgba(255,255,255,.06);
    transition:transform .1s ease, box-shadow .1s ease}
  .pyr-cell.drag{cursor:grab; touch-action:none}
  .pyr-cell.drag:active{cursor:grabbing}
  .pyr-cell:hover{transform:translateY(-2px); box-shadow:0 6px 14px rgba(52,38,22,.24), inset 0 0 0 1px rgba(255,255,255,.1)}
  .pyr-cell.top1{box-shadow:inset 0 0 0 2px #e3bd52, 0 4px 16px rgba(198,158,54,.45)}
  .pyr-cell.top2{box-shadow:inset 0 0 0 2px #d2d7df, 0 4px 14px rgba(150,160,176,.42)}
  .pyr-cell.top3{box-shadow:inset 0 0 0 2px #d2954f, 0 4px 14px rgba(170,114,60,.4)}
  .pyr-cell.sel{box-shadow:inset 0 0 0 2.5px var(--ink), 0 4px 12px rgba(40,30,18,.32)}
  .pyr-cell.dragging{opacity:.3}
  .pyr-cell.dropbefore, .pyr-cell.dropafter{box-shadow:inset 0 0 0 1.5px rgba(0,0,0,.32), 0 3px 8px rgba(0,0,0,.22); z-index:3; overflow:visible}
  .pyr-cell.dropbefore::after, .pyr-cell.dropafter::after{content:''; position:absolute; top:-3px; bottom:-3px; width:4px; z-index:2;
    border-radius:2px; background:var(--ink); box-shadow:0 0 0 1.5px var(--bg), 0 1px 4px rgba(0,0,0,.4)}
  .pyr-cell.dropbefore::after{left:-5px}
  .pyr-cell.dropafter::after{right:-5px}
  .pyr-cell .rk{font-family:var(--serif); font-size:14px; font-weight:600; opacity:.96; line-height:1; text-shadow:0 1px 2px rgba(0,0,0,.45)}
  .pyr-cell .nm{font-size:10px; font-weight:600; line-height:1.1; text-align:center; max-width:100%; overflow:hidden;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; text-shadow:0 1px 3px rgba(0,0,0,.5);
    overflow-wrap:break-word; hyphens:auto}
  .pyr-count{display:flex; align-items:center; justify-content:center; gap:5px; flex-wrap:wrap; margin:8px 0 2px}
  .pyr-count .cl{font-family:var(--sans); font-size:10px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted)}
  .pyr-count button{font-family:var(--sans); font-size:12px; padding:4px 11px; border:1px solid var(--line); background:transparent; color:var(--ink2); border-radius:999px; cursor:pointer; transition:all .1s}
  .pyr-count button:hover{border-color:var(--accent); color:var(--accent)}
  .pyr-count button.on{background:var(--ink); color:var(--bg); border-color:var(--ink)}
  .pyr-count input{width:54px; font-family:var(--sans); font-size:12px; padding:4px 8px; border:1px solid var(--line); border-radius:999px; text-align:center; background:var(--paper); color:var(--ink); -moz-appearance:textfield}
  .pyr-count input::-webkit-outer-spin-button, .pyr-count input::-webkit-inner-spin-button{-webkit-appearance:none; margin:0}
  .pyr-filters{display:flex; justify-content:center; align-items:center; gap:8px; flex-wrap:wrap; margin:14px 0 2px}
  .pyr-filters .scope-sel{flex:1 1 0; min-width:0; max-width:230px; text-align:center}
  .pyr-settled{text-align:center; margin:8px 0 0; font-family:var(--sans); font-size:11.5px; color:var(--muted)}
  .pyr-settled b{color:var(--ink2); font-weight:600}
  .exp-link{color:var(--accent); text-decoration:underline; cursor:pointer}
  .exp-trigger{background:none; border:0; color:var(--ink2); font-size:12.5px; letter-spacing:.04em; cursor:pointer; padding:6px 10px; opacity:.7; transition:opacity .15s,color .15s}
  .exp-trigger:hover{opacity:1; color:var(--accent); text-decoration:underline}
  .pyr-ghost{position:fixed; z-index:300; pointer-events:none; left:0; top:0; transform:translate(-50%,-150%);
    background:var(--ink); color:var(--bg); padding:6px 11px; border-radius:5px; font-family:var(--sans); font-size:12px; font-weight:700;
    box-shadow:0 6px 18px rgba(0,0,0,.32); white-space:nowrap; max-width:200px; overflow:hidden; text-overflow:ellipsis}
  .pyr-drophint{text-align:center; font-family:var(--sans); font-size:12px; color:var(--accent); min-height:16px; margin:2px 0 0}

  /* section heading */
  .head{display:flex; align-items:baseline; gap:14px; margin:30px 2px 16px}
  .head h2{font-size:25px; letter-spacing:.3px}
  .head .line{flex:1; height:1px; background:var(--line); position:relative; top:-5px}
  .head .meta{font-family:var(--sans); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}
  .sub{font-size:25px}

  /* battle */
  .progress{display:flex; align-items:center; gap:14px; margin:18px 2px 0}
  .progress .label{white-space:nowrap}
  .bar{flex:1; height:1px; background:var(--line); position:relative}
  .bar > i{position:absolute; left:0; top:-0.5px; height:2px; background:var(--accent)}
  .ask{text-align:center; margin:34px 0 6px; font-size:30px; letter-spacing:.4px}
  .ask-sub{text-align:center; font-family:var(--sans); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin:0 0 26px}
  .versus{display:grid; grid-template-columns:1fr; gap:0}
  .vs-rule{display:flex; align-items:center; gap:16px; margin:16px 4px}
  .vs-rule .l{flex:1; height:1px; background:var(--line)}
  .vs-rule .w{font-style:italic; color:var(--muted); font-size:17px}
  .song{position:relative; text-align:left; width:100%; background:var(--paper); border:1px solid var(--line); border-radius:3px;
    padding:22px 22px 22px 26px; transition:border-color .15s, background .15s; display:block}
  .song:before{content:''; position:absolute; left:0; top:0; bottom:0; width:3px; background:var(--c)}
  .song:hover{border-color:var(--accent); background:var(--paper2)}
  .song .album{font-family:var(--sans); font-size:10px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted)}
  .song .ttl{font-size:27px; line-height:1.12; margin-top:7px; letter-spacing:.2px}
  .song .key{position:absolute; right:16px; bottom:16px; font-family:var(--sans); font-size:10px; letter-spacing:.1em; color:var(--faint); border:1px solid var(--line); border-radius:2px; padding:1px 6px}
  .song.chosen{border-color:var(--accent)}
  .song .picked{position:absolute; right:16px; top:16px}
  .actions-row{display:flex; justify-content:center; gap:12px; margin-top:24px}

  /* list rows */
  .list{border-top:1px solid var(--line)}
  .row{display:flex; align-items:center; gap:14px; padding:13px 4px; border-bottom:1px solid var(--line); position:relative}
  .row .rk{font-size:17px; color:var(--muted); width:30px; text-align:right; font-variant-numeric:tabular-nums}
  .row .rk.top{color:var(--gold)}
  .row .tick{width:3px; align-self:stretch; background:var(--c); border-radius:2px}
  .row .body{flex:1; min-width:0}
  .row .t{font-size:19px; line-height:1.2; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
  .row .s{font-family:var(--sans); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); margin-top:2px}
  .row .sc{font-variant-numeric:tabular-nums; color:var(--ink2); font-size:16px}

  /* segmented */
  .seg{display:flex; gap:0; border:1px solid var(--line); border-radius:3px; overflow:hidden; margin:8px 0 6px}
  .seg button{flex:1; background:none; border:none; border-right:1px solid var(--line); padding:10px 6px; font-family:var(--sans);
    font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted); font-weight:600}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--ink); color:var(--bg)}

  .feed .ev{padding:11px 2px; border-bottom:1px solid var(--line); font-size:17px}
  .feed .ev:last-child{border-bottom:none}
  .feed .who{font-style:italic}

  /* clashes */
  .clash{border:1px solid var(--line); border-radius:3px; padding:16px 18px; margin-bottom:12px; background:var(--paper)}
  .clash .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:12px}
  .clash .pairname{font-style:italic; color:var(--muted); font-size:15px}
  .clash .cols{display:flex; gap:16px}
  .clash .col{flex:1; min-width:0}
  .clash .col.r{text-align:right}
  .clash .nm{font-family:var(--sans); font-size:10px; letter-spacing:.12em; text-transform:uppercase; margin-bottom:3px}
  .clash .pk{font-size:19px; line-height:1.15}
  .badge{font-family:var(--sans); font-size:9px; letter-spacing:.14em; text-transform:uppercase; font-weight:700; color:var(--accent); border:1px solid var(--accent2); border-radius:2px; padding:2px 7px}

  /* duel */
  .stage{border:1px solid var(--line); border-radius:3px; background:var(--paper); padding:26px 22px; text-align:center}
  .stage .kicker{margin-bottom:10px}
  .stage h2{font-size:28px; margin-bottom:6px}
  .duel-people{display:flex; align-items:center; justify-content:center; gap:10px; margin:18px 0}
  .person{display:flex; align-items:center; gap:8px}
  .lyric-card{border:1px solid var(--line); border-radius:3px; padding:18px; text-align:left; background:var(--paper2); width:100%}
  .lyric-card .for{margin-bottom:8px}
  .lyric-card .ly{font-size:21px; line-height:1.35; font-style:italic; white-space:pre-line}
  .lyric-card:hover{border-color:var(--accent)}
  .lyric-card.sel{border-color:var(--accent); box-shadow:inset 0 0 0 1px var(--accent)}
  .lyric-list{max-height:44vh; overflow-y:auto; border:1px solid var(--line); border-radius:3px; background:var(--paper2)}
  .lyric-line{display:block; width:100%; text-align:left; background:none; border:none; border-bottom:1px solid var(--line);
    padding:12px 15px; font-family:var(--serif); font-size:17px; font-style:italic; color:var(--ink); line-height:1.4}
  .lyric-line:last-child{border-bottom:none}
  .lyric-line:hover{background:rgba(122,92,52,.08); color:var(--accent)}
  .lyric-line:active{background:rgba(122,92,52,.16)}
  .lyric-line.sel{background:rgba(122,92,52,.13); color:var(--accent); box-shadow:inset 3px 0 0 var(--accent)}
  .lyric-line .pick-n{float:right; font-style:normal; font-family:var(--sans); font-size:11px; font-weight:700; color:var(--accent)}
  .wait{font-family:var(--sans); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--muted); margin-top:14px}
  .winner-song{font-size:34px; line-height:1.1; margin:6px 0}
  .quote{font-style:italic; font-size:21px; line-height:1.4; color:var(--ink2); max-width:30ch; margin:14px auto; white-space:pre-line}

  .empty{text-align:center; padding:64px 20px}
  .empty .rule{width:40px; margin:0 auto 18px}
  .empty h2{font-size:26px; margin-bottom:8px}
  .empty p{color:var(--muted); margin:0 auto; max-width:34ch}

  .notice{border:1px solid var(--line); border-left:2px solid var(--accent); background:var(--paper2); border-radius:3px; padding:13px 16px; font-size:15px; line-height:1.45}
  code.mono{font-family:ui-monospace,Menlo,Consolas,monospace; font-size:12px; background:var(--panel); padding:2px 6px; border-radius:3px}

  .sheet-bg{position:fixed; inset:0; background:rgba(27,24,19,.4); z-index:40; display:flex; align-items:flex-end; justify-content:center}
  .sheet{background:var(--paper); border:1px solid var(--line); border-radius:6px 6px 0 0; width:100%; max-width:680px; padding:22px 22px calc(26px + env(safe-area-inset-bottom))}
  @media(min-width:560px){ .sheet-bg{align-items:center} .sheet{border-radius:6px} }
  .welcome-steps{display:flex; flex-direction:column; gap:15px; margin-top:4px}
  .wstep{display:flex; gap:12px; align-items:flex-start}
  .wn{flex:none; width:27px; height:27px; border-radius:999px; border:1px solid var(--line); display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-size:14px; color:var(--accent)}
  .wt{font-family:var(--sans); font-size:11.5px; font-weight:700; letter-spacing:.1em; text-transform:uppercase; color:var(--ink)}
  .wd{font-size:14.5px; color:var(--ink2); line-height:1.36; margin-top:3px}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { h, render } from 'https://cdn.jsdelivr.net/npm/preact@10.20.2/+esm';
import { useState, useEffect, useMemo, useRef, useCallback } from 'https://cdn.jsdelivr.net/npm/preact@10.20.2/hooks/+esm';
import htm from 'https://cdn.jsdelivr.net/npm/htm@3.1.1/+esm';
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.43.4/+esm';
const html = htm.bind(h);

/* ============================================================================
   1. CONFIG  — your Supabase project. (Anon key is safe in client code; access
   is governed by Row Level Security.)

const BASE = 1000, K = 32;
// drag-drop "anchor": a vote whose loser is "__anchor__:<rating>" — sets the song's rating directly.
// The rating rides in the always-present `loser` text column so it works even if `decided_ms` was never migrated.
const ANCHOR='__anchor__';
// Anchor variants: plain rating set, "__placed__" (you dragged it — counts toward accuracy),
// "__certified__" (you locked the album — full accuracy + excluded from further battles).
const MARKERS=['__anchor__','__placed__','__certified__'];
function isAnchor(loser){ return typeof loser==='string' && MARKERS.some(m=> loser.indexOf(m)===0); }
function affirmKind(loser){ if(typeof loser!=='string') return null;
  if(loser.indexOf('__certified__')===0) return 'certified'; if(loser.indexOf('__placed__')===0) return 'placed'; return null; }
function anchorRating(v){ const a=Number(String(v.loser).split(':')[1]); return isNaN(a)? Number(v.decided_ms) : a; }
function computeStats(votes){
  const players = {};
  const sorted = [...votes].sort((a,b)=> new Date(a.created_at) - new Date(b.created_at));
  // Dedupe: each unordered pair {winner,loser} per player counts ONCE — the latest result wins.
  // (Redoing a battle, or settling it in a Duel, UPDATES your call instead of stacking and skewing the rating.)
  // After this, counts[song] = number of DISTINCT songs it's been compared against (its "coverage").
  const latest = new Map(); const anchors = [];
  for (const v of sorted){
    if (isAnchor(v.loser)){ if(SONG_BY_ID[v.winner]) anchors.push(v); continue; }
    if (!SONG_BY_ID[v.winner] || !SONG_BY_ID[v.loser]) continue;
    const lo = v.winner<v.loser?v.winner:v.loser, hi = v.winner<v.loser?v.loser:v.winner;
    latest.set(v.player_id+'|'+lo+'|'+hi, v);     // sorted ascending → last write = newest result
  }
  const feed = [...anchors, ...latest.values()].sort((a,b)=> new Date(a.created_at) - new Date(b.created_at));
  for (const v of feed){
    const anchor = isAnchor(v.loser);        // drag-drop: set this song's rating directly
    let p = players[v.player_id];
    if (!p){ p = players[v.player_id] = { id:v.player_id, name:v.player_name, color:v.player_color||"#7a5c34",
      ratings:{}, counts:{}, n:0, directed:new Set(), affirmed:new Set(), certified:new Set(), certRank:{} }; }
    p.name = v.player_name; if (v.player_color) p.color = v.player_color;
    if (anchor){ const rt=anchorRating(v); if(!isNaN(rt)) p.ratings[v.winner]=rt; if(!p.counts[v.winner]) p.counts[v.winner]=1;
      const k=affirmKind(v.loser); if(k){ p.affirmed.add(v.winner);
        if(k==='certified'){ p.certified.add(v.winner); if(!isNaN(rt)) p.certRank[v.winner]=rt; }   // certRank = locked internal order
        else { p.certified.delete(v.winner); delete p.certRank[v.winner]; } }
      continue; }
    const rw = p.ratings[v.winner] ?? BASE, rl = p.ratings[v.loser] ?? BASE;
    const expW = 1/(1+Math.pow(10,(rl-rw)/400));
    p.ratings[v.winner] = rw + K*(1-expW);
    p.ratings[v.loser]  = rl + K*(0-(1-expW));
    p.counts[v.winner] = (p.counts[v.winner]||0)+1;
    p.counts[v.loser]  = (p.counts[v.loser]||0)+1;
    p.directed.add(v.winner+'>'+v.loser);
    p.n++;
  }
  // Re-lock fully-certified albums: keep your certified internal order, but let cross-album battles
  // slide the whole block (we recentre it on its current average, so it moves as a unit).
  for (const pid in players){ const p=players[pid]; if(!p.certified.size) continue;
    for (const g of ALBUM_GROUPS){ const songs=g.songs;
      if (songs.length>1 && songs.every(id=> p.certified.has(id))){
        let sum=0; for(const id of songs) sum += (p.ratings[id] ?? BASE);
        const avg=sum/songs.length, ordered=[...songs].sort((a,b)=> (p.certRank[b]||0)-(p.certRank[a]||0));
        const n=ordered.length, step=4, top=avg + step*(n-1)/2;
        ordered.forEach((id,i)=>{ p.ratings[id]=top - step*i; });   // locked order, recentred on where the block now sits
      }
    }
  }
  return players;
}
function leaderboard(p){
  if (!p) return [];
  return Object.keys(p.ratings).filter(id=> SONG_BY_ID[id])
    .map(id=>({ id, rating:p.ratings[id], count:p.counts[id]||0 }))
    .sort((a,b)=> b.rating - a.rating);
}
// How trustworthy a ranking is: progress toward ~5 informative comparisons for every song.
// Climbs the whole time you play (rewards depth, not just breadth) — never falsely maxes out early.
// Pass `pool` (array of song ids) to measure within one album; otherwise the whole catalog.
function settledness(p, pool){
  if (!p) return { pct:0, inPlay:0 };
  const D=5; let sum=0, inPlay=0;
  const ids = pool || Object.keys(SONG_BY_ID);
  const aff = p.affirmed || NO_EXCLUDE;
  for (const id of ids){ if (!SONG_BY_ID[id]) continue; const c=p.counts[id]||0; const a=aff.has(id);   // a song you placed/certified is fully settled
    if (c>0 || a){ inPlay++; sum += a ? D : Math.min(c,D); } }
  return { pct: Math.round(100*sum/(D*ids.length)), inPlay };
}
// Accuracy of the COMMUNITY ranking — pools every player's comparisons per song.
function collectiveSettledness(players, pool){
  const D=5; const comps={};
  for (const pid in players){ const c=players[pid].counts; for (const id in c){ if (SONG_BY_ID[id]) comps[id]=(comps[id]||0)+c[id]; } }
  const ids = pool || Object.keys(SONG_BY_ID);
  let sum=0, inPlay=0;
  for (const id of ids){ const ct=comps[id]||0; if (ct>0){ inPlay++; sum+=Math.min(ct,D); } }
  return { pct: Math.round(100*sum/(D*ids.length)), inPlay };
}
// Collective ranking = ONE group ranking fit from EVERYONE'S head-to-head comparisons pooled together.
// Volume-weighted by construction: songs the group compared more get a more-determined rating, and a
// heavy rater contributes more comparisons than a light one — so a 4-vote friend can't sway it like a
// 200-vote friend. (Personal drag/certify anchors stay personal; they're assertions, not group data.)
function pooledConsensus(votes){
  const sorted=[...votes].sort((a,b)=> new Date(a.created_at)-new Date(b.created_at));
  const latest=new Map();                       // dedupe each PERSON's pair to their latest call
  for(const v of sorted){
    if(isAnchor(v.loser)) continue;
    if(!SONG_BY_ID[v.winner]||!SONG_BY_ID[v.loser]) continue;
    const lo=v.winner<v.loser?v.winner:v.loser, hi=v.winner<v.loser?v.loser:v.winner;
    latest.set(v.player_id+'|'+lo+'|'+hi, v);
  }
  const feed=[...latest.values()].sort((a,b)=> new Date(a.created_at)-new Date(b.created_at));
  const R={}, comps={}, raters={};
  for(const v of feed){
    const rw=R[v.winner]??BASE, rl=R[v.loser]??BASE, e=1/(1+Math.pow(10,(rl-rw)/400));
    R[v.winner]=rw+K*(1-e); R[v.loser]=rl-K*(1-e);
    comps[v.winner]=(comps[v.winner]||0)+1; comps[v.loser]=(comps[v.loser]||0)+1;
    (raters[v.winner]||(raters[v.winner]=new Set())).add(v.player_id);
    (raters[v.loser]||(raters[v.loser]=new Set())).add(v.player_id);
  }
  return Object.keys(R).filter(id=>SONG_BY_ID[id]).map(id=>({ id, rating:R[id], raters:raters[id].size, comps:comps[id]||0 }))
    .sort((a,b)=> b.rating-a.rating);
}
const PREF_TH = 24;
function derivedClashes(me, other){
  if (!me || !other) return [];
  const shared = Object.keys(me.ratings).filter(id=> id in other.ratings && (me.counts[id]||0)>0 && (other.counts[id]||0)>0 && SONG_BY_ID[id]);
  const out = [];
  for (let i=0;i<shared.length;i++) for (let j=i+1;j<shared.length;j++){
    const A=shared[i], B=shared[j];
    const mine = me.ratings[A]-me.ratings[B], theirs = other.ratings[A]-other.ratings[B];
    if (Math.sign(mine)===0 || Math.sign(theirs)===0 || Math.sign(mine)===Math.sign(theirs)) continue;
    const mg=Math.abs(mine), tg=Math.abs(theirs);
    if (mg < PREF_TH || tg < PREF_TH) continue;
    out.push({ a:A, b:B, myHi: mine>0?A:B, theirHi: theirs>0?A:B, strength: Math.min(mg,tg) });
  }
  return out.sort((x,y)=> y.strength - x.strength);
}
function derivedAgreements(me, other){     // pairs you BOTH rank the same way
  if (!me || !other) return [];
  const shared = Object.keys(me.ratings).filter(id=> id in other.ratings && (me.counts[id]||0)>0 && (other.counts[id]||0)>0 && SONG_BY_ID[id]);
  const out = [];
  for (let i=0;i<shared.length;i++) for (let j=i+1;j<shared.length;j++){
    const A=shared[i], B=shared[j];
    const mine = me.ratings[A]-me.ratings[B], theirs = other.ratings[A]-other.ratings[B];
    if (Math.sign(mine)===0 || Math.sign(theirs)===0 || Math.sign(mine)!==Math.sign(theirs)) continue;
    const mg=Math.abs(mine), tg=Math.abs(theirs);
    if (mg < PREF_TH || tg < PREF_TH) continue;
    out.push({ a:A, b:B, hi: mine>0?A:B, lo: mine>0?B:A, strength: Math.min(mg,tg) });
  }
  return out.sort((x,y)=> y.strength - x.strength);
}
function directClashes(me, other){
  if (!me || !other) return [];
  const seen=new Set(), res=[];
  for (const d of me.directed){ const [w,l]=d.split('>');
    if (other.directed.has(l+'>'+w)){ const k=[w,l].sort().join('|'); if(seen.has(k))continue; seen.add(k); res.push({ a:w, b:l, myHi:w, theirHi:l }); } }
  return res;
}

/* matchup picker for solo battle.
   Phase 1 — album by album: rank songs *within* each album first (similar songs,
   more fun to compare). An album is "ranked" once each of its songs has had
   INTRA_TARGET distinct within-album battles, then we move to the next album.
   Phase 2 — finals: once every album is ranked, compare the best across albums. */
const INTRA_TARGET = 5;
const NO_EXCLUDE = new Set();
function pairKey(a,b){ return [a,b].sort().join('|'); }
function order(a,b){ return Math.random()<0.5 ? [a,b] : [b,a]; }
function judgedSet(me){ return new Set(me ? [...me.directed].map(d=>{const[w,l]=d.split('>');return pairKey(w,l);}) : []); }
// two songs from the SAME certified album — never battle them (you've locked their order)
function sameCertAlbum(me, a, b){ return me && me.certified && me.certified.has(a) && me.certified.has(b) && albumOf(a)===albumOf(b); }
// pick an informative partner for A — one that grows coverage with a NEW comparison
function bestPartner(A, ids, me, judged, lastKey){
  const ratingOf = id => (me && me.ratings[id]!=null) ? me.ratings[id] : BASE;
  const countOf  = id => (me && me.counts[id]) || 0;
  const rA = ratingOf(A);
  let cands = ids.filter(id=> id!==A && !sameCertAlbum(me,A,id));
  if (!cands.length) return null;
  // strongly prefer pairings you haven't done — repeats are deduped, so they add no info and no coverage
  let pool = cands.filter(id=> !judged.has(pairKey(A,id)) && pairKey(A,id)!==lastKey);
  if (!pool.length) pool = cands.filter(id=> pairKey(A,id)!==lastKey);
  if (!pool.length) pool = cands;
  // among fresh partners, favour the least-covered (advances two songs toward the gate) and closest in rating (most informative)
  pool.sort((x,y)=> (countOf(x)*8 + Math.abs(ratingOf(x)-rA)) - (countOf(y)*8 + Math.abs(ratingOf(y)-rA)));
  const top = pool.slice(0, Math.min(6, pool.length));
  return top[(Math.random()*top.length)|0];
}
function pickMatchup(me, lastKey, scope, exclude){
  const skip = exclude || NO_EXCLUDE;     // songs the player flagged "don't know" — never serve them
  const countOf = id => (me && me.counts[id]) || 0;
  const ratingOf = id => (me && me.ratings[id]!=null) ? me.ratings[id] : BASE;
  const judged = judgedSet(me);

  // Single-album focus ("mini round"): only battles within that one album
  if (scope && scope!=='all'){
    const g = ALBUM_GROUPS.find(x=> x.key===scope);
    const gs = g ? g.songs.filter(id=> !skip.has(id)) : [];
    if (gs.length>1){
      const pool=[...gs].sort((a,b)=> countOf(a)-countOf(b) || Math.random()-0.5);
      const minC=countOf(pool[0]); const leasts=gs.filter(id=> countOf(id)<=minC+1);
      const A=leasts[(Math.random()*leasts.length)|0];
      const B=bestPartner(A, gs, me, judged, lastKey);
      if (B) return order(A,B);
    }
  }

  // ---- Rank-all: ADAPTIVE pairing. Bring songs in & connect the graph (cross-album), then sharpen the closest calls. ----
  const all = SONG_LIST.map(s=>s.id).filter(id=> !skip.has(id));
  const ACC_TARGET = 5;   // the accuracy ceiling — keep raising songs toward this so each battle lifts your accuracy most
  const aff = (me && me.affirmed) ? me.affirmed : null;
  const needsAcc = id => countOf(id) < ACC_TARGET && !(aff && aff.has(id));   // battling this song still raises your accuracy
  function introduce(){                 // serve the comparisons that lift accuracy most: least-settled songs, paired together
    const bare = all.filter(needsAcc);
    if (!bare.length) return null;
    bare.sort((a,b)=> countOf(a)-countOf(b) || Math.random()-0.5);
    const A = bare[(Math.random()*Math.min(10,bare.length))|0];
    let cands = all.filter(id=> id!==A && !judged.has(pairKey(A,id)) && pairKey(A,id)!==lastKey);
    if (!cands.length) cands = all.filter(id=> id!==A && !judged.has(pairKey(A,id)));
    if (!cands.length) return null;
    const rA = ratingOf(A), alA = albumOf(A);
    cands.sort((x,y)=> ((needsAcc(x)?0:600)+(albumOf(x)===alA?40:0)+Math.abs(ratingOf(x)-rA)+countOf(x)*6)   // pair two under-target songs (max accuracy gain), diff era, close rating
                     - ((needsAcc(y)?0:600)+(albumOf(y)===alA?40:0)+Math.abs(ratingOf(y)-rA)+countOf(y)*6));
    const top = cands.slice(0, Math.min(6, cands.length));
    return order(A, top[(Math.random()*top.length)|0]);
  }
  function refine(){                    // compare the closest-in-rating songs you haven't settled — the most informative call
    const ranked = all.filter(id=> countOf(id)>0).sort((a,b)=> ratingOf(b)-ratingOf(a));
    if (ranked.length<2) return null;
    for (let t=0;t<60;t++){
      const i=(Math.random()*ranked.length)|0, A=ranked[i];
      for (let d=1;d<=8;d++){ for (const j of [i-d,i+d]){
        if (j<0||j>=ranked.length) continue;
        const B=ranked[j];
        if (!judged.has(pairKey(A,B)) && pairKey(A,B)!==lastKey && !sameCertAlbum(me,A,B)) return order(A,B);
      }}
    }
    return null;
  }
  const inPlay = all.filter(id=> countOf(id)>0).length;
  const wantIntroduce = inPlay < 30 || Math.random() < 0.5;    // early: build the field; later: half introduce, half sharpen
  return (wantIntroduce ? (introduce() || refine()) : (refine() || introduce())) || freshPair([lastKey]);
}
function freshPair(used){
  const u=new Set(used);
  for(let t=0;t<300;t++){ const a=SONG_LIST[(Math.random()*TOTAL)|0], b=SONG_LIST[(Math.random()*TOTAL)|0];
    if(a.id===b.id) continue; if(u.has(pairKey(a.id,b.id))) continue; return order(a.id,b.id); }
  const a=SONG_LIST[(Math.random()*TOTAL)|0]; let b; do{ b=SONG_LIST[(Math.random()*TOTAL)|0]; }while(b.id===a.id); return [a.id,b.id];
}

/* ============================================================================
   ANALYTICS & SEASONS — computed from a player's raw vote log
============================================================================ */
function groupName(key){ const g=ALBUM_GROUPS.find(x=>x.key===key); return g? g.name : key; }
function fmtMs(ms){ if(ms==null||isNaN(ms)) return '—'; const s=ms/1000;
  if(s<1) return Math.round(ms)+'ms';
  if(s<60) return (s<10? s.toFixed(1): Math.round(s))+'s';
  const m=Math.floor(s/60), r=Math.round(s%60); return m+'m '+(r<10?'0':'')+r+'s'; }
function relTime(iso){ try{ const d=(Date.now()-new Date(iso).getTime())/86400000;
  if(d<1) return 'today'; if(d<2) return 'yesterday'; if(d<31) return Math.floor(d)+'d ago';
  return Math.floor(d/30)+'mo ago'; }catch{ return ''; } }
function votesForSeason(votes, playerId, season){
  return votes.filter(v=> v.player_id===playerId && (v.season||'current')===season && SONG_BY_ID[v.winner] && SONG_BY_ID[v.loser]); }
function seasonsOf(votes, playerId){
  const m={}; for(const v of votes){ if(v.player_id!==playerId) continue; const s=v.season||'current';
    if(!m[s]) m[s]={season:s,count:0,first:v.created_at,last:v.created_at}; m[s].count++;
    if(v.created_at<m[s].first) m[s].first=v.created_at; if(v.created_at>m[s].last) m[s].last=v.created_at; }
  return Object.values(m).sort((a,b)=> (b.last||'').localeCompare(a.last||'')); }
function filterByAlbum(vs, albumKey){
  if(!albumKey||albumKey==='all') return vs;
  return vs.filter(v=> albumOf(v.winner)===albumKey && albumOf(v.loser)===albumKey); }
function computeAnalytics(vs){
  vs=vs.filter(x=> !isAnchor(x.loser));   // drag-drop anchors aren't timed decisions
  const n=vs.length;
  const timed=vs.filter(x=> typeof x.decided_ms==='number' && x.decided_ms>0);
  const times=timed.map(x=>x.decided_ms).sort((a,b)=>a-b);
  const sum=times.reduce((a,b)=>a+b,0);
  const avg=times.length? sum/times.length:0;
  const median=times.length? times[Math.floor(times.length/2)]:0;
  const longest=timed.reduce((m,x)=> !m||x.decided_ms>m.decided_ms?x:m, null);
  const fastest=timed.reduce((m,x)=> !m||x.decided_ms<m.decided_ms?x:m, null);
  const agonized=[...timed].sort((a,b)=>b.decided_ms-a.decided_ms).slice(0,6);
  const alb={};
  for(const x of vs){ const aw=albumOf(x.winner), al=albumOf(x.loser); if(aw!==al) continue;
    if(!alb[aw]) alb[aw]={key:aw,n:0,tSum:0,tN:0}; alb[aw].n++;
    if(typeof x.decided_ms==='number'&&x.decided_ms>0){ alb[aw].tSum+=x.decided_ms; alb[aw].tN++; } }
  const albums=Object.values(alb).map(a=>({key:a.key,name:groupName(a.key),n:a.n,avg:a.tN?a.tSum/a.tN:0,tN:a.tN}))
    .sort((x,y)=> y.avg-x.avg);
  const crossN=vs.filter(x=> albumOf(x.winner)!==albumOf(x.loser)).length;
  return { n, timedN:timed.length, totalTime:sum, avg, median, longest, fastest, agonized, albums, crossN };
}

/* ============================================================================
   4. DUEL STATE MACHINE (pure reducer; host runs it, broadcasts state)
============================================================================ */
/* Supports N players. Everyone moves through one shared matchup sequence at
   their own pace. A disagreement on a matchup queues a pairwise "bout". A
   player can be in at most one bout; while their clash-partner is busy with
   someone else, they keep choosing, and the clash waits its turn (next in line). */
function baseDuel(){ return {
  host:null, phase:'lobby',          // 'lobby' | 'running' | 'done'
  players:[], names:{}, colors:{}, seed:1, scope:'all',  // 'all' or an albumKey (mini round)
  seq:[],                            // shared matchup sequence: [ [a,b], ... ]
  cursor:{},                         // id -> index of the matchup they're choosing
  picks:{},                          // matchupIndex -> { id -> songId }
  resolved:{},                       // "i|idA|idB" -> true (settled, won't re-duel)
  duels:{},                          // duelId -> bout
  busy:{},                           // id -> duelId (the bout they're locked into)
  queue:[],                          // [{players:[x,y], matchup:i, pair:[a,b]}]
  nextId:1, settled:0
}; }
function bothIn(obj, players){ return players.length>=2 && players.every(p=> obj[p]!=null && obj[p]!==''); }
function mulberry(seed){ let a=seed>>>0; return ()=>{ a=a+0x6D2B79F5|0; let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t; return ((t^t>>>14)>>>0)/4294967296; }; }
function scopedPool(scope){
  if(scope && scope!=='all'){ const g=ALBUM_GROUPS.find(x=>x.key===scope); if(g && g.songs.length>1) return g.songs.slice(); }
  return SONG_LIST.map(s=>s.id);
}
function ensureSeq(s, idx){
  const pool=scopedPool(s.scope), P=pool.length;
  while(s.seq.length<=idx){
    const rng=mulberry(((s.seed||1)+s.seq.length*2654435761)>>>0);
    const used=new Set(s.seq.map(p=>pairKey(p[0],p[1])));
    let pair=null;
    for(let k=0;k<600;k++){ const a=pool[(rng()*P)|0], b=pool[(rng()*P)|0];
      if(a===b||used.has(pairKey(a,b))) continue; pair=[a,b]; break; }
    s.seq.push(pair || [pool[0], pool[1%P]]);
  }
}
function rkey(i,x,y){ return i+'|'+[x,y].sort().join('|'); }
function activate(s){            // start any queued clash whose two players are both free
  const rem=[];
  for(const c of s.queue){ const [x,y]=c.players;
    if(!s.busy[x] && !s.busy[y]){
      const id='d'+(s.nextId++);
      s.duels[id]={ id, players:[x,y], matchup:c.matchup, pair:c.pair,
        champions:{ [x]:s.picks[c.matchup][x], [y]:s.picks[c.matchup][y] },
        phase:'conflict', round:1, lyrics:{}, lyricVotes:{}, tpicks:{}, tmiss:0,
        winner:null, winLyric:null, mode:null, continued:{} };
      s.busy[x]=id; s.busy[y]=id;
    } else rem.push(c);
  }
  s.queue=rem;
}
function duelReduce(s, a){
  s = JSON.parse(JSON.stringify(s));
  if (a.by){ if(a.name) s.names[a.by]=a.name; if(a.color) s.colors[a.by]=a.color; }
  let effect=null;
  const d = a.by && s.busy[a.by] ? s.duels[s.busy[a.by]] : null;   // bout this player is in
  const resolveBout=(dd, winnerSong, mode, winLyric)=>{
    dd.phase='resolved'; dd.winner=winnerSong; dd.mode=mode; dd.winLyric=winLyric||null;
    s.resolved[rkey(dd.matchup, dd.players[0], dd.players[1])]=true; s.settled++;
    if (mode!=='draw') effect={ type:'record', row:{
      song_a:dd.pair[0], song_b:dd.pair[1], winner:winnerSong, winner_lyric:winLyric||null, mode, rounds:dd.round,
      player_a: s.names[dd.players[0]]||'?', player_b: s.names[dd.players[1]]||'?' } };
  };
  switch(a.kind){
    case 'hello': break;
    case 'start':
      Object.assign(s, baseDuel());
      s.host=a.host; s.players=a.players; s.names={...s.names,...a.names}; s.colors={...s.colors,...a.colors};
      s.seed=a.seed||1; s.scope=a.scope||'all'; s.phase='running'; s.players.forEach(p=> s.cursor[p]=0); ensureSeq(s,0); break;
    case 'join':                                    // hop into a duel that's already running
      if(s.phase!=='running') break;
      if(!s.players.includes(a.by)){ s.players.push(a.by); s.cursor[a.by]=0; ensureSeq(s,0); } break;
    case 'pick':{
      if(s.phase!=='running' || s.busy[a.by]) break;
      const m=a.matchup; if(m!==s.cursor[a.by]) break;          // ignore stale picks
      (s.picks[m] ||= {})[a.by]=a.song;
      s.cursor[a.by]=m+1; ensureSeq(s, s.cursor[a.by]);
      for(const p of s.players){ if(p===a.by) continue;
        const op=s.picks[m] && s.picks[m][p];
        if(op==null || op===a.song) continue;                   // not answered, or agreement
        const k=rkey(m,a.by,p);
        if(s.resolved[k]) continue;
        if(s.queue.some(c=> rkey(c.matchup,c.players[0],c.players[1])===k)) continue;
        if(Object.values(s.duels).some(dd=> rkey(dd.matchup,dd.players[0],dd.players[1])===k)) continue;
        s.queue.push({ players:[a.by,p], matchup:m, pair:s.seq[m] });
      }
      activate(s); break; }
    case 'unpick':{                                   // "go back" — undo your most recent pick (if it isn't already in a clash)
      if(s.phase!=='running' || s.busy[a.by]) break;
      const cur=s.cursor[a.by]||0; if(cur<=0) break;
      const m=cur-1;
      if(Object.values(s.duels).some(d=> d.matchup===m && d.players.includes(a.by))) break;      // already in a bout on this matchup
      if(s.players.some(p=> p!==a.by && s.resolved[rkey(m,a.by,p)])) break;                        // already settled
      s.queue = s.queue.filter(c=> !(c.matchup===m && c.players.includes(a.by)));                  // drop still-queued clashes of mine here
      if(s.picks[m]) delete s.picks[m][a.by];
      s.cursor[a.by]=m; break; }
    case 'mode':
      if(!d || d.phase!=='conflict') break;
      if(a.mode==='together'){ d.phase='together'; d.tpicks={}; d.tmiss=0; }
      else { d.phase='lyric'; d.round=1; d.lyrics={}; } break;
    case 'togetherpick':
      if(!d || d.phase!=='together') break;
      d.tpicks[a.by]=a.song;
      if(bothIn(d.tpicks,d.players)){ const [p,q]=d.players;
        if(d.tpicks[p]===d.tpicks[q]) resolveBout(d, d.tpicks[p],'together');
        else { d.tpicks={}; d.tmiss++; } } break;
    case 'lyric':
      if(!d || d.phase!=='lyric') break;
      d.lyrics[a.by]=a.text;
      if(bothIn(d.lyrics,d.players)){ d.phase='lyricvote'; d.lyricVotes={}; } break;
    case 'lyricvote':
      if(!d || d.phase!=='lyricvote') break;
      d.lyricVotes[a.by]=a.song;
      if(bothIn(d.lyricVotes,d.players)){ const [p,q]=d.players;
        if(d.lyricVotes[p]===d.lyricVotes[q]){ const w=d.lyricVotes[p];
          const champ=d.players.find(x=> d.champions[x]===w); resolveBout(d, w,'lyric', d.lyrics[champ]); }
        else { d.round++; d.lyrics={}; d.lyricVotes={}; d.phase='lyric'; } } break;
    case 'draw':
      if(d && ['conflict','together','lyric','lyricvote'].includes(d.phase)) resolveBout(d, null,'draw'); break;
    case 'continue':
      if(!d || d.phase!=='resolved') break;
      d.continued[a.by]=true; delete s.busy[a.by];              // return to choosing
      if(d.players.every(p=> d.continued[p])) delete s.duels[d.id];
      activate(s); break;                                       // their next-in-line clash can start
    case 'end': s.phase='done'; break;
    case 'save': {                                  // park the in-progress duel, then clear the live session
      const snapshot=JSON.parse(JSON.stringify(s));
      effect={ type:'saveDuel', snapshot };
      Object.assign(s, baseDuel()); break; }
    case 'abort': Object.assign(s, baseDuel()); break;   // discard the live duel (settled clashes are kept separately)
    case 'resume':                                  // load a parked duel; whoever resumes becomes host
      s=JSON.parse(JSON.stringify(a.state)); s.host=a.host; if(!s.phase||s.phase==='lobby') s.phase='running'; break;
  }
  return { state:s, effect };
}

  const deleteProfile=useCallback(async(playerId, playerName)=>{   // remove a whole profile + its data
    if(!playerId||!me) return false;
    if(offline){ setVotes(v=>{ const nv=v.filter(x=>x.player_id!==playerId); LS.set('ss_votes_'+me.room,nv); return nv; }); return true; }
    const supa=supaRef.current; if(!supa) return false;
    await supa.from('votes').delete().eq('room',me.room).eq('player_id',playerId);
    await supa.from('guesses').delete().eq('room',me.room).eq('guesser_id',playerId);
    if(playerName){ await supa.from('duels').delete().eq('room',me.room).eq('player_a',playerName);
      await supa.from('duels').delete().eq('room',me.room).eq('player_b',playerName); }
    setVotes(v=>v.filter(x=>x.player_id!==playerId));
    setGuesses(g=>g.filter(x=>x.guesser_id!==playerId));
    return true;
  },[me,offline]);

  if(!conf.ready && !LS.get('ss_offline_ok',false) && !me)
    return html`<${Setup} onSaved=${c=>setConf(c)} onSkip=${()=>{ LS.set('ss_offline_ok',true); setConf(cfg()); }} />`;
  if(!me) return html`<${Join} offline=${offline} onJoin=${p=>{ LS.set('ss_me',p); setMe(p); }} />`;

  const onlineIds=new Set(online.map(o=>o.id));
  const others=Object.values(players).filter(p=>p.id!==me.id);
  const clashCount=others.reduce((n,o)=> n+derivedClashes(myP,o).length, 0);

  return html`
    <${Header} me=${me} online=${online} offline=${offline} onMenu=${()=>setMenu(true)} />
    <main class="wrap">
      ${!loaded ? html`<p class="muted" style="text-align:center;padding:46px 0" class="label">Loading the room</p>` : html`
        ${tab==='battle' && html`<${Battle} me=${me} myP=${myP} votes=${votes} onVote=${submitVote} onUndo=${deleteVote} offline=${offline} />`}
        ${tab==='mine' && html`<${You} me=${me} myP=${myP} votes=${votes} guesses=${guesses} onFreeze=${freezeSeason} offline=${offline} />`}
        ${tab==='pyramid' && html`<${Pyramid} me=${me} players=${players} collective=${collective} duels=${duelWins} onVote=${submitVote} onAnchors=${submitAnchors} offline=${offline} />`}
        ${tab==='group' && html`<${Group} me=${me} players=${players} collective=${collective} votes=${votes} guesses=${guesses} online=${onlineIds} offline=${offline} />`}
        ${tab==='clash' && html`<${Clashes} me=${me} myP=${myP} players=${players} offline=${offline} />`}
        ${tab==='duel' && html`<${Duel} me=${me} supa=${supaRef.current} online=${online} offline=${offline} onVote=${submitVote} onUndo=${deleteVote} />`}
        ${tab==='guess' && html`<${Guess} me=${me} players=${players} supa=${supaRef.current} guesses=${guesses} offline=${offline} room=${me.room} />`}
      `}
    </main>
    <${Tabs} tab=${tab} setTab=${setTab} goGroup=${goGroup} clashCount=${clashCount} />
    ${welcome && html`<${Welcome} onClose=${()=>{ LS.set('ss_onboarded',true); setWelcome(false); }} />`}
    ${menu && html`<${Menu} me=${me} offline=${offline} players=${players} onClose=${()=>setMenu(false)} onReset=${resetMine}
      onDeleteProfile=${deleteProfile} onLogout=${()=>{ LS.del('ss_me'); setMe(null); setMenu(false); }}
      onHow=${()=>{ setMenu(false); setWelcome(true); }}
      onSwitch=${()=>{ LS.del('ss_me'); setMe(null); setMenu(false); }} />`}
  `;
}

function Header({me,online,offline,onMenu}){
  return html`<header class="top"><div class="row">
    <div class="wordmark">The <span class="n">Swift</span> Index</div>
    <span class="roomtag">${me.room}</span>
    <div class="grow"></div>
    <div class="presence">
      ${offline ? html`<span class="roomtag">solo</span>` :
        online.slice(0,5).map(o=> html`<div class="ava lit" title=${o.name} style=${{background:o.color}}>${initials(o.name)}</div>`)}
    </div>
    <button class="icon-btn" onClick=${onMenu} aria-label="Menu">≡</button>
  </div></header>`;
}

const NAV=[
  { group:'games', label:'Games', items:[['battle','Battle'],['duel','Duel'],['guess','Guess']] },
  { group:'analytics', label:'Analytics', items:[['mine','You'],['pyramid','Pyramid'],['group','Circle'],['clash','Clashes']] },
];
const TAB_GROUP={}; NAV.forEach(g=> g.items.forEach(([id])=> TAB_GROUP[id]=g.group));
function Tabs({tab,setTab,goGroup,clashCount}){
  const curGroup=TAB_GROUP[tab]||'games';
  const group=NAV.find(g=>g.group===curGroup)||NAV[0];
  return html`<nav class="tabs">
    <div class="subrow">
      ${group.items.map(([id,label])=> html`<button class=${'tab '+(tab===id?'active':'')} onClick=${()=>setTab(id)}>
        <span class="ind"></span>${id==='clash'&&clashCount>0?html`<span class="dot"></span>`:''}${label}</button>`)}
    </div>
    <div class="grouprow">
      ${NAV.map(g=> html`<button class=${'gtab '+(curGroup===g.group?'on':'')} onClick=${()=>goGroup(g.group)}>${g.label}</button>`)}
    </div>
  </nav>`;
}

/* ---------- Battle ---------- */
function Battle({me,myP,votes,onVote,onUndo,offline}){
  const [pair,setPair]=useState(null);
  const [busy,setBusy]=useState(false);
  const [scope,setScope]=useState(LS.get('ss_scope_'+me.room,'all'));   // remembered across returns
  const [last,setLast]=useState(null);     // {id, pair} of the most recent pick, for undo
  const [unknown,setUnknown]=useState(()=> new Set(LS.get('ss_unknown_'+me.room+'_'+me.id, [])));  // songs you flagged "don't know"
  const [picking,setPicking]=useState(false);
  const lastKey=useRef(''); const shownAt=useRef(Date.now());
  const roll=(unk)=>{ const ex=unk||unknown;   // skip only "don't know" songs; certified songs still battle OTHER eras (handled in pickMatchup)
    const [a,b]=pickMatchup(myP,lastKey.current,scope,ex); lastKey.current=pairKey(a,b); shownAt.current=Date.now(); setPair([a,b]); };
  const next=useCallback(()=>roll(),[myP,scope,unknown]);
  useEffect(()=>{ next(); },[scope]);          // roll a fresh pair on mount and on scope change
  useEffect(()=>{ setPicking(false); },[pair]);
  const markUnknown=(id)=>{ const nu=new Set(unknown); nu.add(id); setUnknown(nu); LS.set('ss_unknown_'+me.room+'_'+me.id,[...nu]); setPicking(false); roll(nu); };
  const choose=async(w,l)=>{ if(busy)return; setBusy(true); const shown=pair; const ms=Math.min(Date.now()-shownAt.current,600000);
    const id=await onVote(w,l,ms); setBusy(false); if(id) setLast({id, pair:shown}); next(); };
  const undo=async()=>{ if(busy||!last) return; const L=last; setLast(null); setPair(L.pair); lastKey.current=pairKey(L.pair[0],L.pair[1]); shownAt.current=Date.now(); if(onUndo) await onUndo(L.id); };
  useEffect(()=>{ const h=e=>{ if(!pair)return;
    if(e.key==='ArrowLeft') choose(pair[0],pair[1]);
    else if(e.key==='ArrowRight') choose(pair[1],pair[0]);
    else if(e.key===' '){ e.preventDefault(); next(); }
    else if(e.key==='Backspace'){ e.preventDefault(); undo(); } };
    window.addEventListener('keydown',h); return ()=>window.removeEventListener('keydown',h); },[pair,busy,last]);
  if(!pair) return null;
  const mine=myP?myP.n:0; const [a,b]=pair;
  const albumSongs = scope==='all'? null : (ALBUM_GROUPS.find(g=>g.key===scope)||{songs:[]}).songs;
  const poolN = scope==='all'? TOTAL : albumSongs.length;
  const acc = scope==='all'? settledness(myP) : settledness(myP, albumSongs);   // "pyramid accuracy" — climbs as you sharpen
  const seenInScope = acc.inPlay;
  const complete = seenInScope>=poolN;     // every song in this scope is in your ranking
  const pct = acc.pct;                     // the accuracy bar fills with how settled the ranking is
  const sameAlbum = SONG_BY_ID[a].albumKey===SONG_BY_ID[b].albumKey;
  const roundLabel = complete ? 'Sharpening · the close calls'
    : scope!=='all' ? ('Mini round · '+groupName(scope))
    : (sameAlbum ? ('Ranking · '+SONG_BY_ID[a].album) : 'Ranking · across the eras');
  return html`
    ${offline && html`<div class="notice" style="margin-top:18px">Solo mode — your battles save on this device only. Add your group connection (menu) to play live with friends.</div>`}
    <div class="progress">
      <span class="label">${pct}% accuracy · ${mine} battle${mine===1?'':'s'}</span>
      <div class="bar"><i style=${{width:pct+'%'}}></i></div>
      <span class="label num">${seenInScope} / ${poolN} ranked</span>
    </div>
    ${complete && html`<p style="text-align:center;margin:9px 0 0;font-family:var(--sans);font-size:11.5px;color:var(--muted)">every song's in — each battle now sharpens the close calls and nudges your accuracy up. stop anytime.</p>`}
    <div style="display:flex;justify-content:center;margin-top:16px">
      <select class="scope-sel" value=${scope} onChange=${e=>{ setScope(e.target.value); LS.set('ss_scope_'+me.room, e.target.value); }}>
        <option value="all">Rank all songs</option>
        ${ALBUM_GROUPS.map(g=> html`<option value=${g.key}>Mini round · ${g.name}</option>`)}
      </select>
    </div>
    <div class="label" style="text-align:center;margin-top:18px;color:var(--accent)">${roundLabel}</div>
    <div class="ask" style="margin-top:6px">Which is better?</div>
    <p class="ask-sub">Tap one · or use ← / → · space to skip</p>
    <div class="versus">
      <${SongCard} id=${a} side="left" onPick=${()=>choose(a,b)} />
      <div class="vs-rule"><span class="l"></span><span class="w">versus</span><span class="l"></span></div>
      <${SongCard} id=${b} side="right" onPick=${()=>choose(b,a)} />
    </div>
    <div class="actions-row">
      ${last && html`<button class="btn outline sm" onClick=${undo}>↶ Go back</button>`}
      <button class="btn outline sm" onClick=${next}>Skip</button>
      <button class="btn outline sm" onClick=${()=>setPicking(p=>!p)}>I don't know one</button>
    </div>
    ${picking && html`<div class="actions-row" style="flex-wrap:wrap;margin-top:12px">
      <span class="label" style="align-self:center">don't know which?</span>
      <button class="btn outline sm" onClick=${()=>markUnknown(a)}>${fmtSong(a)}</button>
      <button class="btn outline sm" onClick=${()=>markUnknown(b)}>${fmtSong(b)}</button>
      <button class="btn outline sm" style="border-color:transparent;color:var(--muted)" onClick=${()=>setPicking(false)}>cancel</button>
    </div>`}`;
}
function SongCard({id,side,onPick,plain}){
  const s=SONG_BY_ID[id];
  return html`<button class="song" style=${{'--c':s.color}} onClick=${onPick}>
    <div class="album">${s.album} · ${s.year}</div>
    <div class="ttl">${s.title}</div>
    ${!plain && html`<span class="key">${side==='left'?'←':'→'}</span>`}
  </button>`;
}

/* ---------- Pyramid: one ranked view, many data sources ---------- */
function Pyramid({me,players,collective,duels,onVote,onAnchors,offline}){
  const others=Object.values(players).filter(p=>p.id!==me.id);
  const [source,setSource]=useState('me');   // 'me' | 'all' | 'clashes' | personId
  const [album,setAlbum]=useState('all');
  const [sel,setSel]=useState(null);
  const [showN,setShowN]=useState(()=> typeof window!=='undefined' && window.innerWidth>=680 ? 55 : 28);  // grander default on desktop
  const [vw,setVw]=useState(typeof window!=='undefined'?window.innerWidth:760);  // viewport width → fan wider on desktop
  const [rerank,setRerank]=useState(null);   // song id being re-ranked
  const [drag,setDrag]=useState(null);       // {id,idx} the tile being dragged
  const [ghost,setGhost]=useState(null);     // {x,y,name} floating label
  const [over,setOver]=useState(null);       // global index of hovered tile
  const dragRef=useRef(null);
  const data=useMemo(()=>{
    let l=[];
    if(source==='clashes'){
      const wins={}; for(const d of (duels||[])){ if(d.winner && SONG_BY_ID[d.winner]) wins[d.winner]=(wins[d.winner]||0)+1; }
      l=Object.keys(wins).map(id=>({id, value:wins[id], meta:wins[id]+' clash'+(wins[id]===1?'':'es')+' won'})).sort((a,b)=> b.value-a.value);
    } else if(source==='all'){
      l=(collective||[]).map(r=>({id:r.id, value:r.rating, meta:r.raters+' ranker'+(r.raters===1?'':'s')+' · '+r.comps+' group comparison'+(r.comps===1?'':'s')}));
    } else {
      const p=source==='me'? players[me.id] : players[source];
      l=leaderboard(p).map(r=>({id:r.id, value:r.rating, meta:Math.round(r.rating)+' rating · '+r.count+' comparison'+(r.count===1?'':'s')}));
    }
    if(album!=='all') l=l.filter(r=> albumOf(r.id)===album);
    return l;
  },[source,album,players,collective,duels,me.id]);
  useEffect(()=>{ const f=()=>setVw(window.innerWidth); window.addEventListener('resize',f); return ()=>window.removeEventListener('resize',f); },[]);
  if(offline) return html`<${Empty} title="The Pyramid is live-only" sub="Connect your group to see everyone's rankings stacked into a pyramid." />`;
  const MAXW= vw>=1180?13 : vw>=920?11 : vw>=680?9 : 7;   // rows widen 1,2,3.. up to this, then hold — wider on big screens
  const shown=Math.max(1, Math.min(showN||data.length, data.length));
  const rows=[]; let i=0,r=1;
  while(i<shown){ const w=Math.min(r,MAXW,shown-i); rows.push({items:data.slice(i,i+w), start:i}); i+=w; r++; }
  const selected = (sel!=null && data.find(d=>d.id===sel)) || data[0];
  const selRank = selected ? data.findIndex(d=>d.id===selected.id)+1 : 0;
  const srcLabel = source==='me'?'Your ranking' : source==='all'?'Collective ranking' : source==='clashes'?'Clash winners' : ((players[source]&&players[source].name)||'?')+"'s ranking";
  const accPool = album!=='all' ? (ALBUM_GROUPS.find(g=>g.key===album)||{songs:[]}).songs : null;   // accuracy follows the era filter
  const accDenom = accPool ? accPool.length : TOTAL;
  const settled = source==='clashes' ? null
    : source==='all' ? collectiveSettledness(players, accPool)
    : settledness(source==='me'? players[me.id] : players[source], accPool);
  const draggable = source==='me' && data.length>1;   // re-rank only your own ranking by dragging
  // ---- certify: lock in your order for one era → full accuracy on those songs (and a lift to your overall) ----
  const myCert = (source==='me' && players[me.id]) ? players[me.id].certified : null;
  const canCertify = source==='me' && album!=='all' && data.length>1;
  const albumCertified = canCertify && myCert && data.every(d=> myCert.has(d.id));
  const certify=async()=>{
    if(!data.length) return;
    const vals=data.map(d=>d.value), hi=Math.max(...vals), lo=Math.min(...vals);
    const n=data.length, span=Math.max(hi-lo,(n-1)*4)||(n*4), center=(hi+lo)/2, top=center+span/2, step=n>1?span/(n-1):0;
    const anchors=data.map((d,i)=>({id:d.id, rating:Math.round((top-step*i)*100)/100, mark:'certified'}));  // lock the displayed order
    setSel(data[0].id);
    if(onAnchors) await onAnchors(anchors);
  };
  // ---- export the current ranking as a list (paste into a free importer → Apple Music / Spotify playlist) ----
  const [showExport,setShowExport]=useState(false);
  const exportList = data.slice(0, shown);   // export EXACTLY what's on the pyramid — honor the show-count filter
  const exportName = (source==='all'?'Group':source==='me'?'My':((players[source]&&players[source].name)||'')+'’s')
    + (album!=='all'?' '+groupName(album):' Taylor Swift') + ' ranking';
  const copyList=()=>{
    const text = exportList.map(d=> fmtSong(d.id)+' - Taylor Swift').join('\n');
    if(navigator.clipboard && navigator.clipboard.writeText) navigator.clipboard.writeText(text).catch(()=>{});
    else { try{ const ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); ta.remove(); }catch(_){} }
  };
  const doExport=()=>{ copyList(); setShowExport(true); };   // copy + show the steps FIRST, before opening the importer

  // ---- drag-to-rerank: drop writes a rating "anchor" that places the song exactly, flowing into all your rankings ----
  // Listeners live on window (not the tile) so the release always registers even if touch pointer-capture drops mid-drag.
  const TAP=8;   // px of movement below which a press counts as a tap (select), not a drag
  const dataRef=useRef(data); dataRef.current=data;
  const onAnchorsRef=useRef(onAnchors); onAnchorsRef.current=onAnchors;
  function insertIndex(d, fromIdx, ov){                // index within the list-minus-dragged where it should land
    if(!ov || d[ov.idx]==null) return -1;
    const other=d.filter((_,i)=>i!==fromIdx);
    const oj=other.findIndex(x=>x.id===d[ov.idx].id); if(oj<0) return -1;   // hovering own tile → no-op
    return ov.side==='before' ? oj : oj+1;
  }
  // Compute the rating anchor(s) a drop should write. Normally one (midpoint of new neighbors);
  // but if the neighbors are tied (no room between equal ratings) we spread that tied block into
  // distinct ratings so the dragged song lands EXACTLY at the dropped slot. Returns [{id,rating}].
  function placeDrop(d, fromIdx, ov){
    const X=d[fromIdx]; if(!X) return [];
    const ins=insertIndex(d, fromIdx, ov); if(ins<0) return [];
    const other=d.filter((_,i)=>i!==fromIdx);
    const U= ins>0 ? other[ins-1] : null;              // should end up just ABOVE X (higher rating)
    const L= ins<other.length ? other[ins] : null;     // should end up just BELOW X (lower rating)
    const uR= U? U.value : (L? L.value+2 : BASE+2);
    const lR= L? L.value : (U? U.value-2 : BASE-2);
    if(uR - lR > 1e-6) return [{id:X.id, rating:(uR+lR)/2}];   // room between neighbors → one clean anchor
    // tie: spread the contiguous equal-rated run (plus X) into evenly-spaced distinct ratings
    const v= L? L.value : (U? U.value : BASE);
    let lo=ins; while(lo>0 && Math.abs(other[lo-1].value - v) < 1e-9) lo--;
    let hi=ins; while(hi<other.length && Math.abs(other[hi].value - v) < 1e-9) hi++;
    const block=other.slice(lo,hi);
    const desired=block.slice(0, ins-lo).concat([X], block.slice(ins-lo));   // X inserted at its slot
    const n=desired.length;
    const upper= lo>0 ? other[lo-1].value : v + (n+2);
    const lower= hi<other.length ? other[hi].value : v - (n+2);
    const step=(upper-lower)/(n+1);
    return desired.map((s,i)=> ({id:s.id, rating: upper - step*(i+1)}));
  }
  const dragApi=useRef(null);
  if(!dragApi.current){
    const detach=()=>{ const f=dragApi.current; window.removeEventListener('pointermove',f.move); window.removeEventListener('pointerup',f.up); window.removeEventListener('pointercancel',f.up); };
    const move=(e)=>{
      const dr=dragRef.current; if(!dr) return;
      if(!dr.moved && Math.hypot(e.clientX-dr.sx, e.clientY-dr.sy)<TAP) return;
      if(!dr.moved){ dr.moved=true; setDrag({id:dr.id, idx:dr.idx}); }
      if(e.cancelable) e.preventDefault();
      setGhost({x:e.clientX, y:e.clientY, name:dr.name});
      const el=document.elementFromPoint(e.clientX,e.clientY);
      const cell=el&&el.closest&&el.closest('.pyr-cell');
      let ov=null;
      if(cell&&cell.dataset&&cell.dataset.idx!=null){
        const idx=Number(cell.dataset.idx), r=cell.getBoundingClientRect();
        ov={ idx, side: e.clientX < r.left+r.width/2 ? 'before':'after' };   // left half→before gap, right half→after gap
      }
      dr.over=ov; setOver(ov);
    };
    const up=()=>{
      const dr=dragRef.current; dragRef.current=null; detach();
      setDrag(null); setGhost(null); setOver(null);
      if(!dr) return;
      if(!dr.moved){ setSel(dr.id); return; }           // it was a tap → just open the detail card
      const d=dataRef.current, dragId=d[dr.idx]&&d[dr.idx].id; if(!dragId) return;
      const anchors=placeDrop(d, dr.idx, dr.over); if(!anchors.length) return;
      anchors.forEach(an=>{ an.mark = an.id===dragId ? 'placed' : 'anchor'; });   // the song you moved counts toward accuracy
      setSel(dragId);
      const fn=onAnchorsRef.current; if(fn) fn(anchors);
    };
    dragApi.current={move,up,detach};
  }
  useEffect(()=>()=>{ if(dragApi.current) dragApi.current.detach(); },[]);
  function onDown(e,d,idx){
    if(!draggable){ setSel(d.id); return; }
    if(e.button!=null && e.button>0) return;
    dragRef.current={id:d.id, idx, sx:e.clientX, sy:e.clientY, over:null, moved:false, name:fmtSong(d.id)};
    const f=dragApi.current;
    window.addEventListener('pointermove', f.move, {passive:false});
    window.addEventListener('pointerup', f.up);
    window.addEventListener('pointercancel', f.up);
  }
  const dropRank = drag ? insertIndex(data, drag.idx, over) : -1;   // 0-based slot in list-minus-dragged → new rank = +1

  if(rerank){
    const pool = data.map(d=>d.id).filter(id=> id!==rerank);
    return html`<div>
      <div class="head"><h2>The Pyramid</h2><span class="line"></span></div>
      <${ReRank} song=${rerank} pool=${pool} onVote=${onVote} onClose=${()=>setRerank(null)} />
    </div>`;
  }
  return html`<div>
    <div class="head"><h2>The Pyramid</h2><span class="line"></span></div>
    <div class="pyr-filters">
      <select class="scope-sel" value=${source} onChange=${e=>{setSource(e.target.value);setSel(null);}}>
        <option value="me">Your ranking</option>
        <option value="all">Collective</option>
        <option value="clashes">Clash winners</option>
        ${others.length? html`<optgroup label="A friend's ranking">${others.map(o=> html`<option value=${o.id}>${o.name}</option>`)}</optgroup>` : ''}
      </select>
      <select class="scope-sel" value=${album} onChange=${e=>{setAlbum(e.target.value);setSel(null);}}>
        <option value="all">All eras</option>
        ${ALBUM_GROUPS.map(g=> html`<option value=${g.key}>${g.name}</option>`)}
      </select>
    </div>
    ${settled && settled.inPlay>0 && html`<p class="pyr-settled"><b>~${settled.pct}% accurate</b> · ${settled.inPlay} of ${accDenom} ranked${album!=='all'?' here':''}${settled.pct<65?' · '+(source==='me'?'keep battling':source==='all'?'getting there':'still early'):''}</p>`}
    ${canCertify && html`<div style="text-align:center;margin:9px 0 0">
      <button class="btn outline sm" onClick=${certify} style=${albumCertified?'border-color:var(--accent);color:var(--accent)':''}>${albumCertified?'✓ '+groupName(album)+' certified — re-lock':'Certify my '+groupName(album)+' ranking'}</button>
    </div>`}
    ${showExport && html`<div class="sheet-bg" onClick=${()=>setShowExport(false)}><div class="sheet" onClick=${e=>e.stopPropagation()}>
      <div style="font-family:var(--serif);font-size:21px;text-align:center;letter-spacing:.2px">Make a playlist</div>

/* binary-insertion re-rank: place a song among the others via head-to-head votes */
function ReRank({song, pool, onVote, onClose}){
  const [lo,setLo]=useState(0); const [hi,setHi]=useState(pool.length);
  const [count,setCount]=useState(0); const [busy,setBusy]=useState(false);
  const mid=Math.floor((lo+hi)/2); const opp=(lo<hi)? pool[mid] : null;
  const choose=async(songWins)=>{ if(busy||!opp) return; setBusy(true);
    if(songWins){ if(onVote) await onVote(song, opp); setHi(mid); }
    else { if(onVote) await onVote(opp, song); setLo(mid+1); }
    setCount(c=>c+1); setBusy(false); };
  if(lo>=hi || !opp) return html`<div class="stage">
    <div class="label kicker">Re-ranked in ${count} compare${count===1?'':'s'}</div>
    <h2 style="font-size:26px;line-height:1.15">${fmtSong(song)}</h2>
    <p class="muted" style="margin-top:6px">Your ranking and the pyramid have updated.</p>
    <div class="actions-row"><button class="btn" onClick=${onClose}>Back to the pyramid</button></div></div>`;
  const Card=(id,wins)=> html`<button class="song" style=${{'--c':colorOf(id)}} onClick=${()=>choose(wins)}>
    <div class="album">${SONG_BY_ID[id].album} · ${SONG_BY_ID[id].year}</div><div class="ttl">${fmtSong(id)}</div></button>`;
  return html`<div>
    <div class="ask" style="margin-top:8px">Which is better?</div>
    <p class="ask-sub">Placing ${fmtSong(song)} · compare ${count+1}</p>
    <div class="versus">
      ${Card(song,true)}
      <div class="vs-rule"><span class="l"></span><span class="w">versus</span><span class="l"></span></div>
      ${Card(opp,false)}
    </div>
    <div class="actions-row"><button class="btn outline sm" onClick=${onClose}>Stop here</button></div>
  </div>`;
}

  const who = self ? 'You' : name;
  const knowsThem=useMemo(()=>{ const agg={}; for(const g of (guesses||[])){ if(g.target_name!==name||g.guesser_id===playerId) continue;
      if(!agg[g.guesser_id]) agg[g.guesser_id]={name:g.guesser_name,correct:0,total:0,rounds:0};
      agg[g.guesser_id].correct+=g.correct; agg[g.guesser_id].total+=g.total; agg[g.guesser_id].rounds++; }
    return Object.values(agg).filter(x=>x.total>0).sort((x,y)=> (y.correct/y.total)-(x.correct/x.total)||y.correct-x.correct); },[guesses,name,playerId]);
  const theyKnow=useMemo(()=>{ const agg={}; for(const g of (guesses||[])){ if(g.guesser_id!==playerId) continue;
      if(!agg[g.target_name]) agg[g.target_name]={name:g.target_name,correct:0,total:0,rounds:0};
      agg[g.target_name].correct+=g.correct; agg[g.target_name].total+=g.total; agg[g.target_name].rounds++; }
    return Object.values(agg).filter(x=>x.total>0).sort((x,y)=> (y.correct/y.total)-(x.correct/x.total)||y.correct-x.correct); },[guesses,playerId]);
  if(!all.length) return html`<${Empty} title="No analytics yet" sub=${self?'Play some battles and your stats appear here.':(who+" hasn't battled yet.")} />`;

      <div class="sub2">decided in just ${fmtMs(a.fastest.decided_ms)}</div></div>`}
    ${a.agonized.length>1 && html`<div>
      <div class="head" style="margin:24px 2px 10px"><h2 class="sub">Hardest calls</h2><span class="line"></span></div>

/* ---------- seasons / snapshots ---------- */
function Seasons({me,votes,onFreeze,offline}){
  const seasons=useMemo(()=> seasonsOf(votes, me.id), [votes]);
  const current=seasons.find(s=>s.season==='current');
  const past=seasons.filter(s=>s.season!=='current');
  const [viewing,setViewing]=useState(null);
  const [label,setLabel]=useState('');
  const doFreeze=async()=>{ if(!current||!current.count){ alert('Nothing to freeze yet — play some battles first.'); return; }
    const lbl=label.trim()||('archive '+new Date().toISOString().slice(0,10));
    if(!confirm('Freeze your current ranking as "'+lbl+'" and start fresh? Your snapshot is saved — you can look back anytime.')) return;
    const ok=await onFreeze(lbl); if(ok!==false) setLabel(''); };
  if(viewing){
    const vs=votesForSeason(votes, me.id, viewing);
    const p=computeStats(vs)[me.id];
    return html`<div>
      <div class="head"><h2 style="font-size:22px">${viewing}</h2><span class="line"></span><button class="btn outline sm" onClick=${()=>setViewing(null)}>Back</button></div>
      <${RankList} list=${leaderboard(p)} />

  return html`<div>

      <button class="btn" style="width:100%;margin-top:12px" onClick=${doFreeze}>Freeze & start fresh${current&&current.count?' · '+current.count+' battles':''}</button>

/* ---------- Clashes & common ground ---------- */
function Clashes({me,myP,players,offline}){
  const others=Object.values(players).filter(p=>p.id!==me.id);
  const [tid,setTid]=useState(null);
  const [mode,setMode]=useState('clash');   // 'clash' | 'agree'
  const target=others.find(o=>o.id===tid)||others[0]||null;
  if(offline) return html`<${Empty} title="This needs a friend" sub="Connect your group and get a friend to rank too — then see where you two agree and clash." />`;
  if(!others.length) return html`<${Empty} title="No one to compare with yet" sub=${'Once a friend joins '+me.room+' and ranks some songs, this fills in.'} />`;
  const derived=target?derivedClashes(myP,target):[];
  const direct=target?directClashes(myP,target):[];
  const agree=target?derivedAgreements(myP,target):[];
  const clashBody = (!target||(!derived.length&&!direct.length))
    ? html`<${Empty} title="No clashes yet" sub="You two either agree so far, or haven't ranked enough of the same songs. Keep battling." />`
    : html`<div>
        ${direct.length>0 && html`<div>
          <div class="head" style="margin:24px 2px 12px"><h2 class="sub">Head to head</h2><span class="line"></span><span class="meta">same matchup, opposite pick</span></div>
          ${direct.slice(0,30).map(c=> html`<${ClashRow} me=${me} other=${target} c=${c} mark=${true} />`)}
        </div>`}
        <div>
          <div class="head" style="margin:24px 2px 12px"><h2 class="sub">In the rankings</h2><span class="line"></span><span class="meta">${derived.length} found</span></div>
          ${derived.slice(0,60).map(c=> html`<${ClashRow} me=${me} other=${target} c=${c} />`)}
        </div></div>`;
  const agreeBody = !agree.length
    ? html`<${Empty} title="No common ground yet" sub="Once you've both ranked enough of the same songs, the calls you agree on show up here." />`
    : html`<div>
        <div class="head" style="margin:24px 2px 12px"><h2 class="sub">You both agree</h2><span class="line"></span><span class="meta">${agree.length} found</span></div>
        ${agree.slice(0,80).map(c=> html`<${AgreeRow} me=${me} other=${target} c=${c} />`)}
      </div>`;
  return html`
    <div class="head"><h2>You &amp; ${target?target.name:'friends'}</h2><span class="line"></span></div>
    <div class="seg">${others.map(o=> html`<button class=${target&&target.id===o.id?'on':''} onClick=${()=>setTid(o.id)}>${o.name}</button>`)}</div>
    <div class="seg">
      <button class=${mode==='clash'?'on':''} onClick=${()=>setMode('clash')}>Where you clash</button>
      <button class=${mode==='agree'?'on':''} onClick=${()=>setMode('agree')}>Common ground</button>
    </div>
    ${mode==='clash' ? clashBody : agreeBody}`;
}
function AgreeRow({me,other,c}){
  return html`<div class="clash">
    <div class="top"><span class="pairname">${fmtSong(c.a)} / ${fmtSong(c.b)}</span><span class="badge" style="color:var(--good);border-color:var(--good)">agree</span></div>
